<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1C2E;--navy2:#162233;--navy3:#1E2F44;--navy4:#253650;
  --gold:#D4A843;--gold2:#E8C96A;
  --text:#E8EDF3;--text2:#8FA8C8;--text3:#4A6A8A;
  --green:#3DAA7A;--green2:#2D8A5A;
  --red:#E05555;--red2:#C03535;
  --blue:#4A88D4;--blue2:#2A68B4;
  --purple:#9A6ADA;--amber:#D4943A;
  --card:#1A2B3E;--card2:#243548;
  --border:rgba(255,255,255,0.08);
  --radius:10px;--radius2:14px;
  --sidebar:240px;
  --font:'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--navy);color:var(--text);min-height:100vh;display:flex;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.logo h1{font-size:22px;font-weight:700;color:var(--gold2);letter-spacing:-0.5px}
.logo p{font-size:11px;color:var(--text3);margin-top:2px}
.nav-section{padding:14px 12px 6px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:8px;margin:1px 8px;transition:all .15s;font-size:13.5px;color:var(--text2);border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--navy3);color:var(--text)}
.nav-item.active{background:var(--navy4);color:var(--gold2)}
.nav-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:14px 12px;border-top:1px solid var(--border)}
.sidebar-footer p{font-size:11px;color:var(--text3);text-align:center}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
#topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h2{font-size:18px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.date-badge{background:var(--navy4);color:var(--text2);font-size:12px;padding:5px 12px;border-radius:20px}
#content{flex:1;overflow-y:auto;padding:24px 28px}
#content.chat-active{padding:0;overflow:hidden}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card-title span{font-size:12px;font-weight:400;color:var(--text3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.kpi{background:var(--navy3);border-radius:var(--radius);padding:14px 16px;text-align:center}
.kpi-val{font-size:28px;font-weight:700;color:var(--gold2);line-height:1}
.kpi-label{font-size:11px;color:var(--text3);margin-top:5px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:all .15s}
.btn-gold{background:var(--gold);color:#1A1A1A}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{background:var(--navy4);color:var(--text)}
.btn-red{background:var(--red2);color:#fff}
.btn-green{background:var(--green2);color:#fff}
.btn-green:hover{background:var(--green)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.form-group label{font-size:12px;color:var(--text3);font-weight:500}
.form-group input,.form-group select,.form-group textarea{background:var(--navy4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;font-family:var(--font)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:70px}
select option{background:var(--navy3)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy3);color:var(--text3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--navy4)}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-gold{background:rgba(212,168,67,.15);color:var(--gold2)}
.badge-green{background:rgba(61,170,122,.15);color:var(--green)}
.badge-red{background:rgba(224,85,85,.15);color:var(--red)}
.badge-blue{background:rgba(74,136,212,.15);color:var(--blue)}
.badge-purple{background:rgba(154,106,218,.15);color:var(--purple)}
.badge-gray{background:rgba(255,255,255,.08);color:var(--text2)}
.progress-bar{height:7px;background:var(--navy4);border-radius:10px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:10px;transition:width .3s}
.pf-gold{background:var(--gold)}
.pf-green{background:var(--green)}
.pf-blue{background:var(--blue)}
.pf-red{background:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--navy3);padding:4px;border-radius:10px}
.tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text3);border:none;background:transparent;font-family:var(--font);transition:all .15s}
.tab.active{background:var(--navy4);color:var(--text);font-weight:500}
#toast{position:fixed;bottom:24px;right:24px;background:var(--green2);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:14px}
.stat-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{flex:1;color:var(--text2)}
.stat-value{font-weight:600;color:var(--text)}
.verse-box{background:var(--navy4);border-left:3px solid var(--purple);padding:14px 16px;border-radius:0 8px 8px 0;font-style:italic;font-size:14px;color:var(--text2);margin-bottom:14px;line-height:1.7}
.pilier-card{border-left:3px solid}
.pilier-spirituel{border-color:var(--purple)}
.pilier-education{border-color:var(--blue)}
.pilier-finance{border-color:var(--gold)}
.pilier-loisirs{border-color:var(--green)}
.pilier-investissement{border-color:var(--amber)}
.pilier-objectifs{border-color:var(--red)}
.agenda-day{background:var(--navy3);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px}
.agenda-day-title{font-size:12px;color:var(--gold2);font-weight:600;margin-bottom:8px}
.agenda-item{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13px;color:var(--text2)}
.agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.theme-preview{cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid transparent;transition:border .2s}
.theme-preview:hover{border-color:var(--text3)}
.theme-preview.selected{border-color:var(--gold)}

/* ── Thème clair ── */
[data-theme="light"] body { color: var(--text); }
[data-theme="light"] #sidebar { border-right-color: var(--border); }
[data-theme="light"] .nav-item { color: var(--text2); }
[data-theme="light"] .nav-item:hover { background: var(--navy3); color: var(--text); }
[data-theme="light"] .nav-item.active { background: var(--navy4); color: var(--gold); }
[data-theme="light"] .nav-section { color: var(--text3); }
[data-theme="light"] .logo p { color: var(--text3); }
[data-theme="light"] .sidebar-footer p { color: var(--text3); }
[data-theme="light"] .card { border-color: var(--border); }
[data-theme="light"] .card-title { color: var(--text); }
[data-theme="light"] th { color: var(--text3); background: var(--navy3); }
[data-theme="light"] td { color: var(--text2); border-bottom-color: var(--border); }
[data-theme="light"] tr:hover td { background: var(--navy4); }
[data-theme="light"] .stat-label { color: var(--text2); }
[data-theme="light"] .stat-value { color: var(--text); }
[data-theme="light"] .kpi { background: var(--navy3); }
[data-theme="light"] .kpi-label { color: var(--text3); }
[data-theme="light"] .tab { color: var(--text3); }
[data-theme="light"] .tab.active { color: var(--text); background: var(--navy4); }
[data-theme="light"] .tabs { background: var(--navy3); }
[data-theme="light"] .badge-gray { background: rgba(0,0,0,0.08); color: var(--text2); }
[data-theme="light"] .form-group label { color: var(--text3); }
[data-theme="light"] .form-group input,
[data-theme="light"] .form-group select,
[data-theme="light"] .form-group textarea { background: var(--navy4); border-color: var(--border); color: var(--text); }
[data-theme="light"] .modal { background: var(--card); }
[data-theme="light"] .modal h3 { color: var(--text); }
[data-theme="light"] .modal-actions { border-top-color: var(--border); }
[data-theme="light"] .btn-outline { color: var(--text2); border-color: var(--border); }
[data-theme="light"] .btn-outline:hover { background: var(--navy4); color: var(--text); }
[data-theme="light"] .progress-bar { background: var(--navy3); }
[data-theme="light"] .empty { color: var(--text3); }
[data-theme="light"] .verse-box { background: var(--navy4); color: var(--text2); }
[data-theme="light"] .agenda-day { background: var(--navy3); }
[data-theme="light"] #topbar { background: var(--navy2); border-bottom-color: var(--border); }
[data-theme="light"] #topbar h2 { color: var(--text); }
[data-theme="light"] .date-badge { background: var(--navy4); color: var(--text2); }
[data-theme="light"] select option { background: var(--card); color: var(--text); }
/* Capteur couleur Windows — ne pas supprimer */
#win-accent-sensor{position:absolute;width:1px;height:1px;background:AccentColor;opacity:0;pointer-events:none}
</style>
</head>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
var STORAGE_KEY = 'familyos_data_v2';
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData(); }
  catch(e) { return defaultData(); }
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
function defaultData() {
  return {
    famille: {nom:'Ma Famille', membres:[]},
    spirituel: {prieres:[], versets:[], rencontres:[], meditations:[]},
    education: {programmes:[], cours:[]},
    finances: {transactions:[], budget:[]},
    loisirs: {activites:[], vacances:[]},
    investissements: {comptes:[]},
    objectifs: {projets:[]},
    taches: {items:[], agenda:[]},
    parametres: {theme:'sombre', couleurAccent:'#D4A843', couleurFond:'#0F1C2E', couleurSidebar:'#162233', couleurCarte:'#1A2B3E',
      emailjs_public_key:'', emailjs_service_id:'', emailjs_template_id:'', emailjs_actif:false},
    autres: {
      eglise: {nom:'Mon Église', groupe:'Groupe de prière', jourSemaine:4},
      membres: [],
      programme: [
        {id:'p1',ordre:1,titre:'Ouverture & Accueil',        duree:5,  responsable:'Directeur',notes:'Mot de bienvenue, annonces'},
        {id:'p2',ordre:2,titre:'Louange & Adoration',        duree:15, responsable:'Musicien', notes:'3-4 cantiques de louange'},
        {id:'p3',ordre:3,titre:'Lecture biblique',           duree:10, responsable:'Directeur',notes:'Passage du jour + bref commentaire'},
        {id:'p4',ordre:4,titre:'Prière d\'intercession',     duree:20, responsable:'Groupe',   notes:'Sujets de prière collectifs'},
        {id:'p5',ordre:5,titre:'Témoignages & Partage',      duree:10, responsable:'Membres',  notes:'Réponses de prière, encouragements'},
        {id:'p6',ordre:6,titre:'Prière personnelle',         duree:10, responsable:'Groupe',   notes:'Temps de prière silencieuse'},
        {id:'p7',ordre:7,titre:'Annonces & Bénédiction finale',duree:5,responsable:'Directeur',notes:'Clôture, prochaine rencontre'}
      ],
      rotations: [],
      sujetsPriere: [],
      historique: []
    }
  };
}
var DB = loadData();
function getJourRencontre(){var a=getAutres?getAutres():{};return (a.eglise&&a.eglise.jourSemaine!==undefined)?a.eglise.jourSemaine:4;}
var JOURS_NOMS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

// ─── THEME ────────────────────────────────────────────────────────────────────
function hexToRgb(h) {
  var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r ? {r:parseInt(r[1],16), g:parseInt(r[2],16), b:parseInt(r[3],16)} : null;
}
function lighten(hex, pct) {
  var c = hexToRgb(hex);
  if (!c) return hex;
  var f = pct/100;
  return 'rgb(' + Math.min(255,Math.round(c.r+(255-c.r)*f)) + ',' + Math.min(255,Math.round(c.g+(255-c.g)*f)) + ',' + Math.min(255,Math.round(c.b+(255-c.b)*f)) + ')';
}
function luminance(hex) {
  var c = hexToRgb(hex);
  if (!c) return 0;
  return (0.299*c.r + 0.587*c.g + 0.114*c.b) / 255;
}
function darken(hex, pct) {
  var c = hexToRgb(hex);
  if (!c) return hex;
  var f = pct/100;
  return 'rgb(' + Math.max(0,Math.round(c.r*(1-f))) + ',' + Math.max(0,Math.round(c.g*(1-f))) + ',' + Math.max(0,Math.round(c.b*(1-f))) + ')';
}
function appliquerTheme() {
  var p = DB.parametres || {};
  var r = document.documentElement.style;
  var fond = p.couleurFond || '#0F1C2E';
  var sidebar = p.couleurSidebar || '#162233';
  var accent = p.couleurAccent || '#D4A843';
  var carte = p.couleurCarte || '#1A2B3E';
  var isLight = luminance(fond) > 0.5;

  r.setProperty('--navy', fond);
  r.setProperty('--navy2', sidebar);
  r.setProperty('--card', carte);
  r.setProperty('--gold', accent);
  r.setProperty('--gold2', accent);

  if (isLight) {
    // Thème clair — dériver navy3/navy4 en assombrissant
    r.setProperty('--navy3', darken(fond, 6));
    r.setProperty('--navy4', darken(fond, 10));
    // Texte sombre lisible sur fond clair
    r.setProperty('--text', '#1A1A2E');
    r.setProperty('--text2', '#2C3E55');
    r.setProperty('--text3', '#5A6A7A');
    // Bordures visibles
    r.setProperty('--border', 'rgba(0,0,0,0.12)');
    // Carte avec ombre légère
    r.setProperty('--card2', darken(carte, 4));
    // Sidebar texte
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    // Thème sombre — comportement original
    r.setProperty('--navy3', lighten(fond, 8));
    r.setProperty('--navy4', lighten(fond, 14));
    r.setProperty('--text', '#E8EDF3');
    r.setProperty('--text2', '#8FA8C8');
    r.setProperty('--text3', '#4A6A8A');
    r.setProperty('--border', 'rgba(255,255,255,0.08)');
    r.setProperty('--card2', '#243548');
    document.documentElement.setAttribute('data-theme', 'dark');
  }
}
// ─── NAVIGATION ──────────────────────────────────────────────────────────────
var PAGES = {dashboard:pgDashboard, spirituel:pgSpirituels, education:pgEducation, finances:pgFinances, loisirs:pgLoisirs, investissements:pgInvestissements, objectifs:pgObjectifs, taches:pgTaches, membres:pgMembres, autres:pgAutres, chat:pgChat, comptes:pgComptes, parametres:pgParametres};
var TITLES = {dashboard:'Tableau de bord', spirituel:'Spiritualité', education:'Éducation & Formation', finances:'Finances', loisirs:'Divertissements', investissements:'Investissements', objectifs:'Objectifs (PMP)', taches:'Tâches & Agenda', membres:'Membres de la famille', autres:'Groupe d\'Église — Programme de prière', chat:'Chat — Messagerie familiale', comptes:'Accès & Sécurité', parametres:'Paramètres'};
var currentPage = 'dashboard';

document.querySelectorAll('.nav-item').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentPage = btn.dataset.page;
    document.getElementById('page-title').textContent = TITLES[currentPage];
    var content = document.getElementById('content');
    if (currentPage === 'chat') content.classList.add('chat-active');
    else content.classList.remove('chat-active');
    render();
  });
});

// Mémorise l'onglet actif — clé = page courante
var activeTabMap = {};

function render() {
  // 1. Avant de recharger, lire l'onglet visible
  var prefixes = ['eg-','ta-','sp-','ed-','lo-'];
  for (var pi=0; pi<prefixes.length; pi++) {
    var els = document.querySelectorAll('[id^="'+prefixes[pi]+'"]');
    for (var ei=0; ei<els.length; ei++) {
      if (els[ei].style.display !== 'none') {
        activeTabMap[currentPage] = els[ei].id;
        break;
      }
    }
    if (activeTabMap[currentPage]) break;
  }

  // 2. Recharger le contenu
  document.getElementById('content').innerHTML = PAGES[currentPage]();
  attachEvents();
  // Scroll chat to bottom after render
  if (currentPage === 'chat') {
    setTimeout(function(){
      initFirebaseChat();
      var inp = document.getElementById('chat-input');
      if (inp) inp.focus();
    }, 300);
  }

  // 3. Restaurer l'onglet mémorisé
  var savedTab = activeTabMap[currentPage];
  if (savedTab) {
    var targetEl = document.getElementById(savedTab);
    if (targetEl) {
      // Trouver le préfixe (ex: "eg-membres" → "eg-")
      var dash = savedTab.indexOf('-');
      var prefix = dash >= 0 ? savedTab.slice(0, dash+1) : savedTab;

      // Masquer tous les panneaux du groupe, afficher le bon
      document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(el) {
        el.style.display = (el.id === savedTab) ? '' : 'none';
      });

      // Activer le bon onglet dans la barre
      document.querySelectorAll('.tab').forEach(function(tab) {
        var onc = tab.getAttribute('onclick') || '';
        var m = onc.match(/'([^']+)'/);
        var tabId = m ? m[1] : '';
        if (tabId === savedTab) {
          tab.classList.add('active');
        } else if (tabId.indexOf(prefix) === 0) {
          tab.classList.remove('active');
        }
      });

      // Re-render spéciaux
      if (savedTab === 'ta-agenda') targetEl.innerHTML = renderCalendrier();
      if (savedTab === 'ta-kanban') targetEl.innerHTML = renderKanban();
      if (savedTab === 'ta-gantt')  targetEl.innerHTML = renderGantt();
    }
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function toast(msg, color) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || 'var(--green2)';
  t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2500);
}
function uid() { return Math.random().toString(36).slice(2,9); }
function fmtMoney(n) { return Number(n).toLocaleString('fr-CA',{style:'currency',currency:'CAD',minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) { if (!d) return ''; try { return new Date(d+'T12:00:00').toLocaleDateString('fr-CA'); } catch(e) { return d; } }
function progressColor(p) { if (p >= 75) return 'pf-green'; if (p >= 40) return 'pf-gold'; return 'pf-blue'; }
function priorityBadge(p) { var m = {Haute:'badge-red',Moyenne:'badge-gold',Basse:'badge-gray'}; return '<span class="badge '+(m[p]||'badge-gray')+'">'+p+'</span>'; }
function statutBadge(s) { var m = {'À faire':'badge-gray','En cours':'badge-blue','Terminé':'badge-green','En attente':'badge-gold','Bloqué':'badge-red'}; return '<span class="badge '+(m[s]||'badge-gray')+'">'+s+'</span>'; }
function getMembres() { return DB.famille.membres || []; }
function avatarColor(nom) { var colors = ['#4A88D4','#3DAA7A','#D4A843','#9A6ADA','#D85A30','#E05555','#2A68B4']; return colors[nom ? nom.charCodeAt(0) % colors.length : 0]; }
function initiales(m) { return ((m.prenom||'?')[0] + (m.nom||' ')[0]).toUpperCase(); }
function membreOptions(selected) {
  var html = '<option value="">— Non assigné —</option>';
  getMembres().forEach(function(m) {
    html += '<option value="'+m.prenom+'"'+(m.prenom===selected?' selected':'')+'>'+m.prenom+' '+(m.nom||'')+'</option>';
  });
  return html;
}
function navTo(p) { document.querySelector('[data-page="'+p+'"]').click(); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function switchTab(evt, target) {
  var dashIdx = target.indexOf('-');
  var prefix = dashIdx >= 0 ? target.slice(0, dashIdx+1) : target;
  evt.target.closest('.tabs').querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  evt.target.classList.add('active');
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(el) {
    el.style.display = el.id === target ? '' : 'none';
  });
  // Mémoriser l'onglet choisi pour la page courante
  activeTabMap[currentPage] = target;
  // Rendu à la demande
  if (target === 'ta-agenda') { var ag=document.getElementById('ta-agenda'); if(ag) ag.innerHTML=renderCalendrier(); }
  if (target === 'ta-kanban') { var kb=document.getElementById('ta-kanban'); if(kb) kb.innerHTML=renderKanban(); }
  if (target === 'ta-gantt')  { var gt=document.getElementById('ta-gantt');  if(gt) gt.innerHTML=renderGantt(); }
}
function attachEvents() {
  document.querySelectorAll('.modal-bg').forEach(function(m) {
    m.addEventListener('click', function(e) { if (e.target === m) m.classList.remove('open'); });
  });
}
function exportData() {
  var blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'FamilyOS_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('Données exportées ✓');
}
function importData(evt) {
  var f = evt.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(e) {
    try { DB = JSON.parse(e.target.result); saveData(); render(); toast('Données importées ✓'); }
    catch(err) { toast('Fichier invalide','var(--red2)'); }
  };
  r.readAsText(f);
}
function supprimerItem(module, col, id) {
  if (!confirm('Supprimer cet élément?')) return;
  DB[module][col] = DB[module][col].filter(function(i) { return i.id !== id; });
  saveData(); render(); toast('Supprimé ✓','var(--red2)');
}

function pgDashboard() {
  var taches = DB.taches.items;
  var aTermine = taches.filter(function(t) { return t.statut === 'Terminé'; }).length;
  var aFaire = taches.filter(function(t) { return t.statut !== 'Terminé'; }).length;
  var projets = DB.objectifs.projets;
  var pctMoy = projets.length ? Math.round(projets.reduce(function(a,p) { return a+Number(p.pct||0); },0)/projets.length) : 0;
  var totalInvest = DB.investissements.comptes.reduce(function(a,c) { return a+Number(c.solde||0); },0);
  var revenus = DB.finances.transactions.filter(function(t) { return t.type==='Revenu'; }).reduce(function(a,t) { return a+Number(t.montant||0); },0);
  var depenses = DB.finances.transactions.filter(function(t) { return t.type==='Dépense'; }).reduce(function(a,t) { return a+Number(t.montant||0); },0);
  var versetActuel = DB.spirituel.versets.find(function(v) { return v.actuel; }) || DB.spirituel.versets[0];
  var lundi = new Date().getDay()===1 ? '🟢 Aujourd\'hui!' : '📅 Lundi prochain';
  var vendredi = new Date().getDay()===5 ? '🟢 Aujourd\'hui!' : '📅 Vendredi prochain';
  var urgentes = taches.filter(function(t) { return t.priorite==='Haute' && t.statut!=='Terminé'; }).slice(0,4);
  var recents = projets.filter(function(p) { return p.statut!=='Terminé'; }).slice(0,3);
  var html = '';
  html += '<div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">';
  html += kpi(aFaire,'Tâches actives','var(--text)') + kpi(aTermine,'Tâches terminées','var(--green)') + kpi(projets.length,'Objectifs','var(--blue)') + kpi(pctMoy+'%','Avancement moyen','var(--amber)') + kpi(fmtMoney(totalInvest),'Total investissements','var(--gold)') + kpi(fmtMoney(revenus-depenses),'Solde financier',revenus-depenses>=0?'var(--green)':'var(--red)');
  html += '</div>';
  html += '<div class="grid2">';
  html += '<div>';
  html += '<div class="card"><div class="card-title">🗓️ Rappels spirituels</div>';
  html += '<div class="stat-row"><div class="stat-label">🙏 Rencontre de prière</div><div>'+lundi+'</div></div>';
  html += '<div class="stat-row"><div class="stat-label">🕊️ Méditation</div><div>'+vendredi+'</div></div>';
  if (versetActuel) {
    html += '<div style="margin-top:12px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px">VERSET EN COURS</div>';
    html += '<div class="verse-box">"'+versetActuel.texte+'"<br><small style="font-size:11px">'+(versetActuel.ref||'')+'</small></div></div>';
  } else {
    html += '<div class="empty" style="padding:16px">Aucun verset. <button class="btn btn-sm btn-outline" onclick="navTo(\'spirituel\')">Ajouter →</button></div>';
  }
  html += '</div>';
  html += '<div class="card"><div class="card-title">⚡ Tâches urgentes</div>';
  if (urgentes.length) {
    urgentes.forEach(function(t) {
      html += '<div class="stat-row"><div class="stat-label">'+t.titre+'</div><div>'+statutBadge(t.statut)+'</div></div>';
    });
  } else { html += '<div class="empty" style="padding:12px">Aucune tâche urgente 🎉</div>'; }
  html += '<button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="navTo(\'taches\')">Voir toutes →</button></div>';
  html += '</div>';
  html += '<div>';
  html += '<div class="card"><div class="card-title">🎯 Objectifs en cours <span>'+recents.length+' actifs</span></div>';
  if (recents.length) {
    recents.forEach(function(p) {
      html += '<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:500">'+p.nom+'</span><span style="font-size:12px;color:var(--text3)">'+(p.pct||0)+'%</span></div>';
      html += '<div class="progress-bar"><div class="progress-fill '+progressColor(p.pct||0)+'" style="width:'+(p.pct||0)+'%"></div></div>';
      html += '<div style="font-size:11px;color:var(--text3);margin-top:3px">'+(p.responsable||'')+' · Échéance: '+fmtDate(p.echeance)+'</div></div>';
    });
  } else {
    html += '<div class="empty">Aucun objectif actif.<br><button class="btn btn-sm btn-gold" onclick="navTo(\'objectifs\')" style="margin-top:8px">Créer un objectif →</button></div>';
  }
  html += '</div>';
  html += '<div class="card"><div class="card-title">💰 Résumé financier</div>';
  html += '<div class="stat-row"><div class="stat-label">Revenus</div><div class="stat-value" style="color:var(--green)">'+fmtMoney(revenus)+'</div></div>';
  html += '<div class="stat-row"><div class="stat-label">Dépenses</div><div class="stat-value" style="color:var(--red)">'+fmtMoney(depenses)+'</div></div>';
  html += '<div class="stat-row"><div class="stat-label">Épargne nette</div><div class="stat-value" style="color:'+(revenus-depenses>=0?'var(--green)':'var(--red)')+'">'+fmtMoney(revenus-depenses)+'</div></div>';
  html += '<button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="navTo(\'finances\')">Détails →</button></div>';
  html += '</div>';
  html += '</div>';
  return html;
}
function kpi(val, label, color) {
  return '<div class="kpi"><div class="kpi-val" style="color:'+color+'">'+(val||0)+'</div><div class="kpi-label">'+label+'</div></div>';
}

// PAGE: FINANCES
// ═══════════════════════════════════════════════════════════════════════════
function pgFinances() {
  var txs = DB.finances.transactions;
  var revenus = txs.filter(function(t){return t.type==='Revenu';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
  var depenses = txs.filter(function(t){return t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
  var cats = [];
  txs.filter(function(t){return t.type==='Dépense';}).forEach(function(t){if(cats.indexOf(t.categorie)<0)cats.push(t.categorie);});
  var html = '<div class="grid4" style="margin-bottom:20px">';
  html += kpi(fmtMoney(revenus),'Revenus','var(--green)') + kpi(fmtMoney(depenses),'Dépenses','var(--red)') + kpi(fmtMoney(revenus-depenses),'Solde net',revenus-depenses>=0?'var(--green)':'var(--red)') + kpi(txs.length,'Transactions','var(--blue)');
  html += '</div><div class="grid2">';
  html += '<div class="card"><div class="card-title">📊 Dépenses par catégorie</div>';
  if (cats.length) {
    cats.forEach(function(cat) {
      var total = txs.filter(function(t){return t.categorie===cat&&t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
      var pct = depenses ? Math.round(total/depenses*100) : 0;
      html += '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0"><span>'+(cat||'Autre')+'</span><span style="color:var(--red);font-weight:600">'+fmtMoney(total)+'</span></div><div class="progress-bar"><div class="progress-fill pf-red" style="width:'+pct+'%"></div></div><div style="font-size:11px;color:var(--text3);text-align:right">'+pct+'%</div></div>';
    });
  } else { html += '<div class="empty">Aucune transaction.</div>'; }
  html += '</div>';
  html += '<div class="card"><div class="card-title">💰 Budget mensuel <button class="btn btn-outline btn-sm" onclick="openModal(\'modal-budget\')">+ Budget</button></div>';
  if (DB.finances.budget.length) {
    DB.finances.budget.forEach(function(b) {
      var dep = txs.filter(function(t){return t.categorie===b.categorie&&t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
      var pct = b.montant ? Math.round(dep/b.montant*100) : 0;
      html += '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>'+b.categorie+'</span><span style="color:'+(pct>100?'var(--red)':'var(--text2)')+'">'+fmtMoney(dep)+' / '+fmtMoney(b.montant)+'</span></div><div class="progress-bar"><div class="progress-fill '+(pct>100?'pf-red':'pf-blue')+'" style="width:'+Math.min(pct,100)+'%"></div></div></div>';
    });
  } else { html += '<div class="empty">Aucun budget configuré.</div>'; }
  html += '</div></div>';
  html += '<div class="card"><div class="card-title">📋 Transactions <button class="btn btn-gold btn-sm" onclick="openModal(\'modal-transaction\')">+ Ajouter</button></div>';
  if (txs.length) {
    var sorted = txs.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    html += '<div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Type</th><th>Montant</th><th></th></tr>';
    sorted.forEach(function(t) {
      html += '<tr><td>'+fmtDate(t.date)+'</td><td>'+(t.desc||'-')+'</td><td>'+(t.categorie||'-')+'</td><td><span class="badge '+(t.type==='Revenu'?'badge-green':'badge-red')+'">'+t.type+'</span></td><td style="font-weight:600;color:'+(t.type==='Revenu'?'var(--green)':'var(--red)')+'">'+fmtMoney(t.montant)+'</td><td><button class="btn btn-sm btn-outline" onclick="supprimerFinance(\'transactions\',\''+t.id+'\')">✕</button></td></tr>';
    });
    html += '</table></div>';
  } else { html += '<div class="empty">Aucune transaction.</div>'; }
  html += '</div>';
  html += '<div class="modal-bg" id="modal-transaction"><div class="modal"><h3>💰 Nouvelle transaction</h3><div class="form-row"><div class="form-group"><label>Type</label><select id="tx-type"><option>Dépense</option><option>Revenu</option></select></div><div class="form-group"><label>Montant ($)</label><input type="number" id="tx-montant" placeholder="0.00"/></div></div><div class="form-row"><div class="form-group"><label>Description</label><input id="tx-desc" placeholder="Description"/></div><div class="form-group"><label>Catégorie</label><input id="tx-cat" placeholder="Épicerie, Loyer..."/></div></div><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="tx-date"/></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-transaction\')">Annuler</button><button class="btn btn-gold" onclick="ajouterTransaction()">Enregistrer</button></div></div></div>'
  + '<div class="modal-bg" id="modal-budget"><div class="modal"><h3>📊 Ligne de budget</h3><div class="form-row"><div class="form-group"><label>Catégorie</label><input id="bg-cat" placeholder="Épicerie, Transport..."/></div><div class="form-group"><label>Budget mensuel ($)</label><input type="number" id="bg-montant" placeholder="500"/></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-budget\')">Annuler</button><button class="btn btn-gold" onclick="ajouterBudget()">Enregistrer</button></div></div></div>';
  return html;
}

// PAGE: INVESTISSEMENTS
// ═══════════════════════════════════════════════════════════════════════════
function pgInvestissements() {
  var inv = DB.investissements;
  var total = inv.comptes.reduce(function(a,c){return a+Number(c.solde||0);},0);
  var totalCible = inv.comptes.reduce(function(a,c){return a+Number(c.cible||0);},0);
  var types = ['REEE','REER','CELI','Placement','Immobilier','Autre'];
  var html = '<div class="grid4" style="margin-bottom:20px">';
  html += kpi(fmtMoney(total),'Total investi','var(--gold)') + kpi(fmtMoney(totalCible),'Objectif total','var(--blue)') + kpi((totalCible?Math.round(total/totalCible*100):0)+'%','Progression','var(--green)') + kpi(inv.comptes.length,'Comptes','var(--text)');
  html += '</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:15px;color:var(--text)">Comptes & Placements</h3><button class="btn btn-gold btn-sm" onclick="openModal(\'modal-investissement\')">+ Compte</button></div>';
  html += '<div class="grid2">';
  var hasAny = false;
  types.forEach(function(type) {
    var comptes = inv.comptes.filter(function(c){return c.type===type;});
    if (!comptes.length) return;
    hasAny = true;
    var sousTotal = comptes.reduce(function(a,c){return a+Number(c.solde||0);},0);
    html += '<div class="card pilier-card pilier-investissement"><div class="card-title">'+type+' <span>'+fmtMoney(sousTotal)+'</span></div>';
    comptes.forEach(function(c) {
      var pct = c.cible ? Math.min(100,Math.round(Number(c.solde)/Number(c.cible)*100)) : 0;
      html += '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><div><span style="font-size:13px;font-weight:500">'+c.nom+'</span>'+(c.institution?'<span style="font-size:11px;color:var(--text3);margin-left:6px">'+c.institution+'</span>':'')+'</div><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:600;color:var(--gold)">'+fmtMoney(c.solde)+'</span><button class="btn btn-sm btn-outline" onclick="supprimerItem(\'investissements\',\'comptes\',\''+c.id+'\')">✕</button></div></div>'+(c.cible?'<div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3)"><span>Cible: '+fmtMoney(c.cible)+'</span><span>'+pct+'%</span></div><div class="progress-bar"><div class="progress-fill pf-gold" style="width:'+pct+'%"></div></div></div>':'')+(c.cotisation?'<div style="font-size:11px;color:var(--text3);margin-top:3px">Cotisation: '+fmtMoney(c.cotisation)+'/mois</div>':'')+'</div>';
    });
    html += '</div>';
  });
  if (!hasAny) { html += '<div class="card" style="grid-column:1/-1"><div class="empty">Aucun compte enregistré. <button class="btn btn-gold btn-sm" onclick="openModal(\'modal-investissement\')" style="margin-top:10px">Ajouter →</button></div></div>'; }
  html += '</div>';
  html += '<div class="modal-bg" id="modal-investissement"><div class="modal"><h3>📈 Nouveau compte / placement</h3><div class="form-row"><div class="form-group"><label>Type</label><select id="iv-type"><option>REEE</option><option>REER</option><option>CELI</option><option>Placement</option><option>Immobilier</option><option>Autre</option></select></div><div class="form-group"><label>Nom du compte</label><input id="iv-nom" placeholder="Ex: REEE enfant 1"/></div></div><div class="form-row"><div class="form-group"><label>Institution</label><input id="iv-inst" placeholder="Banque, courtier..."/></div><div class="form-group"><label>Solde actuel ($)</label><input type="number" id="iv-solde" placeholder="0"/></div></div><div class="form-row"><div class="form-group"><label>Objectif cible ($)</label><input type="number" id="iv-cible" placeholder="0"/></div><div class="form-group"><label>Cotisation mensuelle ($)</label><input type="number" id="iv-cot" placeholder="0"/></div></div><div class="form-row"><div class="form-group"><label>Notes</label><textarea id="iv-notes" placeholder="Bénéficiaire, stratégie..."></textarea></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-investissement\')">Annuler</button><button class="btn btn-gold" onclick="ajouterInvestissement()">Enregistrer</button></div></div></div>';
  return html;
}

      html += '<div class="card pilier-card pilier-objectifs" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px"><span style="font-weight:600;font-size:15px">'+p.nom+'</span>'+priorityBadge(p.priorite)+statutBadge(p.statut)+(p.pilier?'<span class="badge badge-purple">'+p.pilier+'</span>':'')+'</div><div style="font-size:12px;color:var(--text3);margin-bottom:8px">Responsable: <strong style="color:var(--text2)">'+(p.responsable||'?')+'</strong> · Échéance: <strong style="color:'+(retard?'var(--red)':'var(--amber)')+'">'+fmtDate(p.echeance)+'</strong></div>'+(p.description?'<div style="font-size:13px;color:var(--text2);margin-bottom:8px">'+p.description+'</div>':'')+'<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--text3)">Avancement</span><span style="font-weight:600">'+(p.pct||0)+'%</span></div><div class="progress-bar"><div class="progress-fill '+progressColor(p.pct||0)+'" style="width:'+(p.pct||0)+'%"></div></div></div>'+(p.indicateurs?'<div style="font-size:12px;color:var(--text3);margin-top:6px">KPI: '+p.indicateurs+'</div>':'')+(p.risques?'<div style="font-size:12px;color:var(--amber);margin-top:4px">⚠️ Risques: '+p.risques+'</div>':'')+'</div><div style="display:flex;flex-direction:column;gap:4px;margin-left:12px"><button class="btn btn-sm btn-outline" onclick="editPctObjectif(\''+p.id+'\')">% Màj</button><button class="btn btn-sm btn-outline" onclick="supprimerItem(\'objectifs\',\'projets\',\''+p.id+'\')">✕</button></div></div></div>';
    });
  } else { html += '<div class="empty">Aucun objectif.<br><button class="btn btn-gold btn-sm" onclick="openModal(\'modal-objectif\')" style="margin-top:10px">Créer un objectif →</button></div>'; }
  html += '<div class="modal-bg" id="modal-objectif"><div class="modal"><h3>🎯 Nouvel objectif (PMP)</h3><div class="form-row"><div class="form-group"><label>Nom de l\'objectif</label><input id="ob-nom" placeholder="Ex: Rembourser la voiture"/></div><div class="form-group"><label>Pilier</label><select id="ob-pilier"><option>Famille</option><option>Spirituel</option><option>Éducation</option><option>Finance</option><option>Santé</option><option>Investissement</option><option>Autre</option></select></div></div><div class="form-row"><div class="form-group"><label>Description / Portée</label><textarea id="ob-desc" placeholder="Portée et résultat attendu..."></textarea></div></div><div class="form-row"><div class="form-group"><label>Responsable</label><select id="ob-resp">'+membreOptions()+'</select></div><div class="form-group"><label>Priorité</label><select id="ob-prio"><option>Haute</option><option>Moyenne</option><option>Basse</option></select></div></div><div class="form-row"><div class="form-group"><label>Statut</label><select id="ob-statut"><option>À faire</option><option>En cours</option><option>Terminé</option><option>En attente</option><option>Bloqué</option></select></div><div class="form-group"><label>% complétion</label><input type="number" id="ob-pct" value="0" min="0" max="100"/></div></div><div class="form-row"><div class="form-group"><label>Début</label><input type="date" id="ob-debut"/></div><div class="form-group"><label>Échéance</label><input type="date" id="ob-echeance"/></div></div><div class="form-row"><div class="form-group"><label>Indicateurs (KPI)</label><input id="ob-kpi" placeholder="Ex: Économiser 500$/mois..."/></div></div><div class="form-row"><div class="form-group"><label>Registre des risques</label><textarea id="ob-risques" placeholder="Risques identifiés..."></textarea></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-objectif\')">Annuler</button><button class="btn btn-gold" onclick="ajouterObjectif()">Créer l\'objectif</button></div></div></div>';
  return html;
}

// PAGE: TÂCHES & AGENDA — avec Calendrier, Kanban, Gantt
// ═══════════════════════════════════════════════════════════════════════════
var calMois = new Date().getMonth();
var calAnnee = new Date().getFullYear();
var KANBAN_COLS = DB.taches && DB.taches.kanbanCols ? DB.taches.kanbanCols : ['À faire','En cours','En attente','Bloqué','Terminé'];
var KANBAN_COLORS = {'À faire':'#4A6A8A','En cours':'#4A88D4','En attente':'#D4943A','Bloqué':'#E05555','Terminé':'#3DAA7A'};
var PRIO_COLORS = {Haute:'#E05555',Moyenne:'#D4A843',Basse:'#4A88D4'};

function pgTaches() {
  var items = DB.taches.items;

  html += '<button class="tab" onclick="switchTab(event,\'ta-kanban\')">🗂 Kanban</button>';

  html += '<div id="ta-taches">';

  html += '<div><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">À faire & En cours</div>';
  var actives = items.filter(function(i){return i.statut!=='Terminé';}).sort(function(a,b){var o={Haute:0,Moyenne:1,Basse:2};return(o[a.priorite]||1)-(o[b.priorite]||1);});
  if (actives.length) {
    actives.forEach(function(item) {
      var retard = item.echeance && new Date(item.echeance+'T12:00:00') < new Date() ? 'border-left:3px solid var(--red);' : '';

      html += '<span style="font-size:13px;font-weight:500;flex:1">'+item.titre+'</span>'+priorityBadge(item.priorite)+'</div>';
      html += '<div style="font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;padding-left:23px">';
      if (item.responsable) html += '<span>👤 '+item.responsable+'</span>';
      if (item.echeance) html += '<span style="color:'+(new Date(item.echeance+'T12:00:00')<new Date()?'var(--red)':'var(--text3)')+'">📅 '+fmtDate(item.echeance)+'</span>';
      if (item.categorie) html += '<span>🏷 '+item.categorie+'</span>';
      html += '</div>';
      html += '<div style="padding-left:23px;margin-top:6px;display:flex;gap:6px;align-items:center">';
      html += statutBadge(item.statut);
      html += '<select onchange="changerStatutTache(\''+item.id+'\',this.value)" style="font-size:11px;padding:2px 6px;border-radius:6px;border:1px solid var(--border);background:var(--navy4);color:var(--text2);cursor:pointer">';
      ['À faire','En cours','En attente','Bloqué','Terminé'].forEach(function(s){ html += '<option'+(s===item.statut?' selected':'')+'>'+s+'</option>'; });
      html += '</select>';
      html += '<button class="btn btn-sm btn-outline" onclick="supprimerItem(\'taches\',\'items\',\''+item.id+'\')">✕</button>';
      html += '</div></div>';
    });
  } else { html += '<div class="empty">Toutes les tâches sont terminées! 🎉</div>'; }
  html += '</div>';
  // Terminées
  html += '<div><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Récemment terminées</div>';
  var dones = items.filter(function(i){return i.statut==='Terminé';});
  if (dones.length) {
    dones.slice(-8).forEach(function(item) {
      html += '<div class="card" style="margin-bottom:6px;padding:10px 14px;opacity:.7"><div style="display:flex;align-items:center;gap:8px"><input type="checkbox" checked onchange="deTerminerTache(\''+item.id+'\')" style="width:14px;height:14px;accent-color:var(--green)"/><span style="font-size:13px;text-decoration:line-through;color:var(--text3);flex:1">'+item.titre+'</span><span class="badge badge-green">✓</span></div></div>';
    });
  } else { html += '<div class="empty">Aucune tâche terminée.</div>'; }
  html += '</div></div></div>';

  // ── TAB CALENDRIER ────────────────────────────────────────────────────────
  html += '<div id="ta-agenda" style="display:none">';

  // ── TAB KANBAN ────────────────────────────────────────────────────────────
  html += '<div id="ta-kanban" style="display:none">';
  html += renderKanban();
  html += '</div>';

  // ── TAB GANTT ─────────────────────────────────────────────────────────────
  html += '<div id="ta-gantt" style="display:none">';
  html += renderGantt();
  html += '</div>';

  // ── MODALS ────────────────────────────────────────────────────────────────
  html += '<div class="modal-bg" id="modal-tache"><div class="modal"><h3>✅ Nouvelle tâche</h3><div class="form-row"><div class="form-group"><label>Titre</label><input id="tc-titre" placeholder="Description courte"/></div><div class="form-group"><label>Responsable</label><select id="tc-resp">'+membreOptions()+'</select></div></div><div class="form-row"><div class="form-group"><label>Description</label><textarea id="tc-desc" placeholder="Détails..."></textarea></div></div><div class="form-row"><div class="form-group"><label>Priorité</label><select id="tc-prio"><option>Haute</option><option selected>Moyenne</option><option>Basse</option></select></div><div class="form-group"><label>Statut</label><select id="tc-statut"><option>À faire</option><option>En cours</option><option>En attente</option></select></div></div><div class="form-row"><div class="form-group"><label>Catégorie</label><select id="tc-cat"><option>Général</option><option>Spirituel</option><option>Éducation</option><option>Finance</option><option>Santé</option><option>Maison</option><option>Administratif</option></select></div><div class="form-group"><label>Début</label><input type="date" id="tc-debut"/></div></div><div class="form-row"><div class="form-group"><label>Échéance</label><input type="date" id="tc-echeance"/></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-tache\')">Annuler</button><button class="btn btn-gold" onclick="ajouterTache()">Créer</button></div></div></div>';
  html += '<div class="modal-bg" id="modal-agenda"><div class="modal"><h3>📅 Nouvel événement</h3><div class="form-row"><div class="form-group"><label>Titre</label><input id="ag-titre" placeholder="Nom de l\'événement"/></div><div class="form-group"><label>Date</label><input type="date" id="ag-date"/></div></div><div class="form-row"><div class="form-group"><label>Heure</label><input type="time" id="ag-heure"/></div><div class="form-group"><label>Lieu</label><input id="ag-lieu" placeholder="Où?"/></div></div><div class="form-row"><div class="form-group"><label>Couleur</label><select id="ag-couleur"><option value="#4A88D4">Bleu</option><option value="#3DAA7A">Vert</option><option value="#D4A843">Or</option><option value="#E05555">Rouge</option><option value="#9A6ADA">Violet</option></select></div></div><div class="form-row"><div class="form-group"><label>Notes</label><textarea id="ag-notes"></textarea></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-agenda\')">Annuler</button><button class="btn btn-gold" onclick="ajouterAgenda()">Ajouter</button></div></div></div>';
  html += '<div class="modal-bg" id="modal-kanban-col"><div class="modal"><h3>🗂 Nouvelle colonne Kanban</h3><div class="form-row"><div class="form-group"><label>Nom de la colonne</label><input id="kc-nom" placeholder="Ex: En révision"/></div></div><div class="form-row"><div class="form-group"><label>Couleur</label><input type="color" id="kc-color" value="#4A88D4"/></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal(\'modal-kanban-col\')">Annuler</button><button class="btn btn-gold" onclick="ajouterColonneKanban()">Ajouter</button></div></div></div>';
  return html;
}

// ── CALENDRIER ──────────────────────────────────────────────────────────────
function renderCalendrier() {
  var html = '';
  var moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var joursNoms = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var today = new Date();
  var todayStr = today.toISOString().slice(0,10);
  // Header
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  html += '<button class="btn btn-outline btn-sm" onclick="calNav(-1)">◀ Préc.</button>';
  html += '<div style="display:flex;align-items:center;gap:12px">';
  html += '<span style="font-size:16px;font-weight:600">'+moisNoms[calMois]+' '+calAnnee+'</span>';
  html += '<button class="btn btn-outline btn-sm" onclick="calNav(0)">Aujourd\'hui</button>';
  html += '</div>';
  html += '<div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm" onclick="calNav(1)">Suiv. ▶</button><button class="btn btn-gold btn-sm" onclick="openModal(\'modal-agenda\')">+ Événement</button></div>';
  html += '</div>';
  // Légende couleurs
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#E05555;display:inline-block"></span>Tâche Haute</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D4A843;display:inline-block"></span>Tâche Moyenne</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#4A88D4;display:inline-block"></span>Tâche Basse</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#3DAA7A;display:inline-block"></span>Terminée</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#9A6ADA;display:inline-block"></span>Événement</span>';
  html += '</div>';
  // Grille jours
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
  joursNoms.forEach(function(j){ html += '<div style="text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px">'+j+'</div>'; });
  html += '</div>';
  // Calculer 1er jour du mois
  var premier = new Date(calAnnee, calMois, 1);
  var offset = (premier.getDay()+6)%7; // lundi=0
  var nbJours = new Date(calAnnee, calMois+1, 0).getDate();
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  // Cellules vides avant
  for (var i=0;i<offset;i++) html += '<div style="min-height:80px;background:var(--navy4);border-radius:6px;opacity:.3"></div>';
  // Jours
  for (var d=1;d<=nbJours;d++) {
    var dateStr = calAnnee+'-'+(calMois+1<10?'0':'')+(calMois+1)+'-'+(d<10?'0':'')+d;
    var isToday = dateStr===todayStr;
    var tachesDuJour = DB.taches.items.filter(function(t){return t.echeance===dateStr;});
    var eventsDuJour = DB.taches.agenda.filter(function(a){return a.date===dateStr;});
    var hasItems = tachesDuJour.length>0 || eventsDuJour.length>0;
    html += '<div style="min-height:80px;background:'+(isToday?'rgba(212,168,67,.15)':'var(--navy3)')+';border-radius:6px;padding:5px;border:'+(isToday?'1px solid var(--gold)':'1px solid transparent')+';overflow:hidden">';
    html += '<div style="font-size:12px;font-weight:'+(isToday?'700':'500')+';color:'+(isToday?'var(--gold)':'var(--text2)')+';margin-bottom:3px">'+d+'</div>';
    // Tâches
    tachesDuJour.slice(0,3).forEach(function(t){
      var col = t.statut==='Terminé' ? '#3DAA7A' : (PRIO_COLORS[t.priorite]||'#4A88D4');
      html += '<div style="background:'+col+'22;border-left:2px solid '+col+';border-radius:3px;padding:2px 4px;margin-bottom:2px;font-size:10px;color:'+col+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" title="'+t.titre+(t.responsable?' — '+t.responsable:'')+'">';
      html += t.titre;
      html += '</div>';
    });
    if (tachesDuJour.length>3) html += '<div style="font-size:9px;color:var(--text3)">+'+( tachesDuJour.length-3)+' tâche(s)</div>';
    // Événements agenda
    eventsDuJour.slice(0,2).forEach(function(a){
      html += '<div style="background:'+(a.couleur||'#9A6ADA')+'22;border-left:2px solid '+(a.couleur||'#9A6ADA')+';border-radius:3px;padding:2px 4px;margin-bottom:2px;font-size:10px;color:'+(a.couleur||'#9A6ADA')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+a.titre+'">';
      html += (a.heure?a.heure+' ':'')+a.titre;
      html += '</div>';
    });
    html += '</div>';
  }
  // Cellules vides après
  var total = offset+nbJours;
  var reste = total%7===0 ? 0 : 7-(total%7);
  for (var j=0;j<reste;j++) html += '<div style="min-height:80px;background:var(--navy4);border-radius:6px;opacity:.3"></div>';
  html += '</div>';
  // Liste événements du mois
  var evtsMois = DB.taches.agenda.filter(function(a){
    var d = new Date(a.date+'T12:00:00');
    return d.getMonth()===calMois && d.getFullYear()===calAnnee;
  }).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  if (evtsMois.length) {
    html += '<div style="margin-top:16px"><div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Événements de ce mois</div>';
    evtsMois.forEach(function(a){
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--navy3);border-radius:8px;margin-bottom:6px">';
      html += '<div style="width:10px;height:10px;border-radius:50%;background:'+(a.couleur||'var(--blue)')+';flex-shrink:0"></div>';
      html += '<div style="flex:1"><span style="font-size:13px;font-weight:500">'+a.titre+'</span>';
      if (a.heure) html += '<span style="font-size:11px;color:var(--text3);margin-left:8px">'+a.heure+'</span>';
      if (a.lieu) html += '<span style="font-size:11px;color:var(--text3);margin-left:8px">📍 '+a.lieu+'</span>';
      html += '</div><span style="font-size:12px;color:var(--text3)">'+fmtDate(a.date)+'</span>';
      html += '<button class="btn btn-sm btn-outline" onclick="supprimerItem(\'taches\',\'agenda\',\''+a.id+'\')">✕</button>';
      html += '</div>';
    });
    html += '</div>';
  }
  return html;
}

// ── KANBAN ──────────────────────────────────────────────────────────────────
function renderKanban() {
  if (!DB.taches.kanbanCols) DB.taches.kanbanCols = ['À faire','En cours','En attente','Bloqué','Terminé'];
  if (!DB.taches.kanbanColors) DB.taches.kanbanColors = {};
  var cols = DB.taches.kanbanCols;
  var colors = DB.taches.kanbanColors;
  var html = '';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html += '<span style="font-size:13px;color:var(--text2)">Glissez ou changez le statut de chaque carte</span>';
  html += '<div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm" onclick="openModal(\'modal-kanban-col\')">+ Colonne</button><button class="btn btn-gold btn-sm" onclick="openModal(\'modal-tache\')">+ Tâche</button></div>';
  html += '</div>';
  html += '<div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;align-items:flex-start">';
  cols.forEach(function(col) {
    var colColor = colors[col] || KANBAN_COLORS[col] || '#4A6A8A';
    var cartes = DB.taches.items.filter(function(t){return t.statut===col;});
    html += '<div style="flex:0 0 220px;background:var(--navy3);border-radius:12px;padding:12px;border-top:3px solid '+colColor+'">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    html += '<span style="font-size:13px;font-weight:600;color:'+colColor+'">'+col+'</span>';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    html += '<span style="font-size:11px;background:'+colColor+'22;color:'+colColor+';padding:2px 8px;border-radius:10px;font-weight:600">'+cartes.length+'</span>';
    if (col !== 'À faire' && col !== 'Terminé') {
      html += '<button class="btn btn-sm btn-outline" style="padding:2px 6px;font-size:10px" onclick="supprimerColonneKanban(\''+col+'\')">✕</button>';
    }
    html += '</div></div>';
    // Cartes
    cartes.forEach(function(t) {
      var pCol = PRIO_COLORS[t.priorite]||'#4A6A8A';
      var retard = t.echeance && new Date(t.echeance+'T12:00:00') < new Date() && col!=='Terminé';
      html += '<div style="background:var(--card);border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid '+pCol+';'+(retard?'border-right:3px solid var(--red);':'')+'">';
      html += '<div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px">'+t.titre+'</div>';
      if (t.responsable||t.echeance) {
        html += '<div style="font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">';

        if (t.echeance) html += '<span style="color:'+(retard?'var(--red)':'var(--text3)')+'">📅 '+fmtDate(t.echeance)+'</span>';
        html += '</div>';
      }
      html += '<div style="display:flex;gap:4px;flex-wrap:wrap">';
      // Boutons déplacer vers colonnes adjacentes
      var idx = cols.indexOf(col);
      if (idx>0) html += '<button class="btn btn-sm btn-outline" style="font-size:10px;padding:2px 6px" onclick="deplacerTache(\''+t.id+'\',\''+cols[idx-1]+'\')">◀ '+cols[idx-1].slice(0,6)+'</button>';
      if (idx<cols.length-1) html += '<button class="btn btn-sm btn-outline" style="font-size:10px;padding:2px 6px" onclick="deplacerTache(\''+t.id+'\',\''+cols[idx+1]+'\')">'+cols[idx+1].slice(0,6)+' ▶</button>';
      html += '<button class="btn btn-sm btn-outline" style="font-size:10px;padding:2px 6px;margin-left:auto" onclick="supprimerItem(\'taches\',\'items\',\''+t.id+'\')">✕</button>';
      html += '</div></div>';
    });
    if (!cartes.length) html += '<div style="text-align:center;padding:16px;font-size:12px;color:var(--text3);border:1px dashed var(--border);border-radius:8px">Vide</div>';
    html += '</div>';
  });
  html += '</div>';
  // Légende priorités
  html += '<div style="display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--text3)">';
  html += '<span>Priorité : </span>';
  ['Haute','Moyenne','Basse'].forEach(function(p){ html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:'+PRIO_COLORS[p]+';display:inline-block"></span>'+p+'</span>'; });
  html += '<span style="margin-left:8px">🔴 = En retard</span>';
  html += '</div>';
  return html;
}

// ── GANTT ──────────────────────────────────────────────────────────────────
function renderGantt() {
  var html = '';
  var today = new Date(); today.setHours(0,0,0,0);
  // Rassembler tâches + objectifs avec dates
  var items = [];
  DB.taches.items.forEach(function(t){
    if (t.echeance) {
      var debut = t.debut ? new Date(t.debut+'T12:00:00') : new Date(today.getTime()-7*86400000);
      items.push({id:t.id,nom:t.titre,debut:debut,fin:new Date(t.echeance+'T12:00:00'),type:'tache',priorite:t.priorite,statut:t.statut,responsable:t.responsable||''});
    }
  });
  DB.objectifs.projets.forEach(function(p){
    if (p.echeance) {
      var debut = p.debut ? new Date(p.debut+'T12:00:00') : new Date(today.getTime()-14*86400000);
      items.push({id:p.id,nom:p.nom,debut:debut,fin:new Date(p.echeance+'T12:00:00'),type:'objectif',priorite:p.priorite,statut:p.statut,pct:p.pct||0,responsable:p.responsable||''});
    }
  });
  if (!items.length) {
    return '<div class="empty">Aucune tâche ou objectif avec date d\'échéance.<br>Ajoutez des dates pour voir le Gantt.</div>';
  }
  // Calculer plage de dates
  var minDate = items.reduce(function(m,i){return i.debut<m?i.debut:m;}, items[0].debut);
  var maxDate = items.reduce(function(m,i){return i.fin>m?i.fin:m;}, items[0].fin);
  minDate = new Date(Math.min(minDate.getTime(), today.getTime()-7*86400000));
  maxDate = new Date(Math.max(maxDate.getTime(), today.getTime()+7*86400000));
  var totalDays = Math.ceil((maxDate-minDate)/(86400000));
  var scale = Math.max(1, Math.min(3, 840/totalDays)); // px par jour, max 3
  var barW = Math.round(totalDays*scale);
  // Header
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html += '<span style="font-size:13px;color:var(--text2)">'+items.length+' éléments · tâches et objectifs</span>';
  html += '<button class="btn btn-gold btn-sm" onclick="openModal(\'modal-tache\')">+ Tâche</button>';
  html += '</div>';
  // Conteneur scroll
  html += '<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">';
  // Timeline header — semaines
  var LBL_W = 180;
  html += '<div style="display:flex;background:var(--navy3);border-bottom:1px solid var(--border);min-width:'+(LBL_W+barW+20)+'px">';
  html += '<div style="width:'+LBL_W+'px;flex-shrink:0;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3)">ÉLÉMENT</div>';
  html += '<div style="flex:1;position:relative;height:32px;overflow:hidden">';
  // Générer étiquettes semaines
  var cur = new Date(minDate);
  while (cur <= maxDate) {
    var x = Math.round((cur-minDate)/86400000*scale);
    var lbl = cur.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});
    html += '<div style="position:absolute;left:'+x+'px;top:8px;font-size:10px;color:var(--text3);white-space:nowrap">'+lbl+'</div>';
    cur = new Date(cur.getTime()+7*86400000);
  }
  html += '</div></div>';
  // Lignes
  items.forEach(function(item,idx) {
    var isOdd = idx%2===0;
    var startX = Math.max(0,Math.round((item.debut-minDate)/86400000*scale));
    var endX = Math.round((item.fin-minDate)/86400000*scale);
    var width = Math.max(8, endX-startX);
    var barColor = item.type==='objectif' ? '#9A6ADA' : (PRIO_COLORS[item.priorite]||'#4A88D4');
    if (item.statut==='Terminé') barColor = '#3DAA7A';
    var retard = item.fin < today && item.statut!=='Terminé';
    if (retard) barColor = '#E05555';
    html += '<div style="display:flex;align-items:center;background:'+(isOdd?'var(--navy4)':'var(--navy3)')+';border-bottom:1px solid var(--border);min-width:'+(LBL_W+barW+20)+'px;min-height:38px">';
    html += '<div style="width:'+LBL_W+'px;flex-shrink:0;padding:6px 12px;overflow:hidden">';
    html += '<div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+item.nom+'">'+( item.type==='objectif'?'🎯 ':'')+item.nom+'</div>';
    html += '<div style="font-size:10px;color:var(--text3)">'+( item.responsable||'')+(item.pct!==undefined?' · '+item.pct+'%':'')+'</div>';
    html += '</div>';
    // Barre
    html += '<div style="flex:1;position:relative;height:38px;padding:6px 0">';
    // Ligne aujourd'hui
    var todayX = Math.round((today-minDate)/86400000*scale);
    if (todayX>=0 && todayX<=barW) html += '<div style="position:absolute;left:'+todayX+'px;top:0;bottom:0;width:1px;background:rgba(212,168,67,.5)"></div>';
    // Barre tâche
    html += '<div style="position:absolute;left:'+startX+'px;top:8px;width:'+width+'px;height:22px;background:'+barColor+';border-radius:4px;display:flex;align-items:center;overflow:hidden" title="'+item.nom+' · '+fmtDate(item.debut.toISOString().slice(0,10))+' → '+fmtDate(item.fin.toISOString().slice(0,10))+'">';
    if (item.pct) html += '<div style="height:100%;width:'+item.pct+'%;background:rgba(255,255,255,.25);border-radius:4px 0 0 4px"></div>';
    html += '<span style="position:absolute;left:6px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden">'+item.nom.slice(0,22)+'</span>';
    html += '</div>';
    html += '</div></div>';
  });
  html += '</div>';
  // Légende
  html += '<div style="display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--text3);flex-wrap:wrap">';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#E05555;display:inline-block"></span>Haute / Retard</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#D4A843;display:inline-block"></span>Moyenne</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#4A88D4;display:inline-block"></span>Basse</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#9A6ADA;display:inline-block"></span>Objectif</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#3DAA7A;display:inline-block"></span>Terminé</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:1px;height:12px;background:rgba(212,168,67,.7);display:inline-block"></span>Aujourd\'hui</span>';
  html += '</div>';
  return html;
}

function calNav(dir) {
  if (dir===0) { calMois=new Date().getMonth(); calAnnee=new Date().getFullYear(); }
  else { calMois+=dir; if(calMois>11){calMois=0;calAnnee++;} if(calMois<0){calMois=11;calAnnee--;} }
  document.getElementById('ta-agenda').innerHTML = renderCalendrier();
}
function changerStatutTache(id, statut) {
  var t = DB.taches.items.find(function(i){return i.id===id;});
  if (t) { t.statut=statut; saveData(); render(); }
}
function deplacerTache(id, statut) {
  var t = DB.taches.items.find(function(i){return i.id===id;});
  if (t) { t.statut=statut; saveData(); document.getElementById('ta-kanban').innerHTML = renderKanban(); toast('Déplacé vers "'+statut+'" ✓'); }
}
function ajouterColonneKanban() {
  var nom = document.getElementById('kc-nom').value.trim();
  var color = document.getElementById('kc-color').value;
  if (!nom) return toast('Saisissez un nom','var(--red2)');
  if (!DB.taches.kanbanCols) DB.taches.kanbanCols=['À faire','En cours','En attente','Bloqué','Terminé'];
  if (!DB.taches.kanbanColors) DB.taches.kanbanColors={};
  if (DB.taches.kanbanCols.indexOf(nom)<0) DB.taches.kanbanCols.splice(DB.taches.kanbanCols.length-1,0,nom);
  DB.taches.kanbanColors[nom]=color;
  saveData(); closeModal('modal-kanban-col');
  document.getElementById('ta-kanban').innerHTML = renderKanban();
  toast('Colonne ajoutée ✓');
}
function supprimerColonneKanban(nom) {
  if (!confirm('Supprimer la colonne "'+nom+'" ? Les tâches seront déplacées vers "À faire".')) return;
  DB.taches.kanbanCols = DB.taches.kanbanCols.filter(function(c){return c!==nom;});
  DB.taches.items.forEach(function(t){if(t.statut===nom)t.statut='À faire';});
  saveData(); document.getElementById('ta-kanban').innerHTML = renderKanban(); toast('Colonne supprimée ✓','var(--red2)');
}

// ═══════════════════════════════════════════════════════════════════════════
// EXPORT PDF
// ═══════════════════════════════════════════════════════════════════════════
function exporterPDF() {
  if (!window.jspdf) { toast('Bibliothèque PDF non chargée — vérifiez votre connexion','var(--red2)'); return; }
  try {
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var W = doc.internal.pageSize.getWidth();
    var today = new Date().toLocaleDateString('fr-CA');
    var y = 15;
    // Header
    doc.setFillColor(15,28,46); doc.rect(0,0,W,28,'F');
    doc.setTextColor(212,168,67); doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text('FamilyOS — Rapport familial', 14, 17);
    doc.setFontSize(9); doc.setTextColor(143,168,200);
    doc.text(DB.famille.nom + ' · Généré le ' + today, 14, 24);
    y = 36;
    var hs = {fillColor:[30,47,68], textColor:[212,168,67], fontSize:8};
    var bs = {fontSize:8, textColor:[180,200,220]};
    var ss = {fillColor:[15,28,46]};
    function addSection(title) {
      if (y > 220) { doc.addPage(); y = 15; }
      doc.setTextColor(212,168,67); doc.setFontSize(13); doc.setFont('helvetica','bold');
      doc.text(title, 14, y); y += 6;
    }
    // KPIs
    addSection('Tableau de bord');
    var rev = DB.finances.transactions.filter(function(t){return t.type==='Revenu';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
    var dep = DB.finances.transactions.filter(function(t){return t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
    doc.autoTable({startY:y, head:[['Indicateur','Valeur']], body:[
      ['Membres',getMembres().length],
      ['Tâches actives',DB.taches.items.filter(function(t){return t.statut!=='Terminé';}).length],
      ['Objectifs',DB.objectifs.projets.length],
      ['Total investi',fmtMoney(DB.investissements.comptes.reduce(function(a,c){return a+Number(c.solde||0);},0))],
      ['Revenus',fmtMoney(rev)], ['Dépenses',fmtMoney(dep)], ['Solde',fmtMoney(rev-dep)]
    ], theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    // Membres
    if (getMembres().length) {
      addSection('Membres de la famille');
      doc.autoTable({startY:y, head:[['Prénom','Nom','Rôle','Âge','Email']], body:getMembres().map(function(m){return[m.prenom,m.nom||'-',m.role||'-',m.age||'-',m.email||'-'];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Objectifs
    if (DB.objectifs.projets.length) {
      addSection('Objectifs (PMP)');
      doc.autoTable({startY:y, head:[['Objectif','Pilier','Responsable','Priorité','Statut','%','Échéance']], body:DB.objectifs.projets.map(function(p){return[p.nom,p.pilier||'-',p.responsable||'-',p.priorite||'-',p.statut||'-',(p.pct||0)+'%',fmtDate(p.echeance)];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Tâches
    if (DB.taches.items.length) {
      addSection('Tâches');
      doc.autoTable({startY:y, head:[['Tâche','Responsable','Priorité','Statut','Échéance']], body:DB.taches.items.map(function(t){return[t.titre,t.responsable||'-',t.priorite||'-',t.statut||'-',fmtDate(t.echeance)];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Finances
    if (DB.finances.transactions.length) {
      addSection('Finances');
      doc.autoTable({startY:y, head:[['Date','Description','Catégorie','Type','Montant']], body:DB.finances.transactions.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,30).map(function(t){return[fmtDate(t.date),t.desc||'-',t.categorie||'-',t.type,fmtMoney(t.montant)];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Investissements
    if (DB.investissements.comptes.length) {
      addSection('Investissements');
      doc.autoTable({startY:y, head:[['Type','Nom','Institution','Solde','Cible','%']], body:DB.investissements.comptes.map(function(c){return[c.type,c.nom,c.institution||'-',fmtMoney(c.solde),c.cible?fmtMoney(c.cible):'-',c.cible?Math.round(c.solde/c.cible*100)+'%':'-'];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss});
    }
    // Footer
    var np = doc.internal.getNumberOfPages();
    for (var i = 1; i <= np; i++) {
      doc.setPage(i); doc.setFontSize(7); doc.setTextColor(74,106,138);
      doc.text('FamilyOS · '+DB.famille.nom+' · Page '+i+'/'+np, W/2, doc.internal.pageSize.getHeight()-6, {align:'center'});
    }
    doc.save('FamilyOS_Rapport_'+today+'.pdf');
    toast('Rapport PDF généré ✓');
  } catch(e) { console.error(e); toast('Erreur PDF: '+e.message,'var(--red2)'); }
}

// ═══════════════════════════════════════════════════════════════════════════
// EXPORT EXCEL
// ═══════════════════════════════════════════════════════════════════════════
function exporterExcel() {
  if (!window.XLSX) { toast('Bibliothèque Excel non chargée — vérifiez votre connexion','var(--red2)'); return; }
  try {
    var WB = XLSX.utils.book_new();
    var today = new Date().toLocaleDateString('fr-CA');
    var rev = DB.finances.transactions.filter(function(t){return t.type==='Revenu';}).reduce(function(a,t){return a+Number(t.montant||0);},0);

// COULEURS WINDOWS
// ═══════════════════════════════════════════════════════════════════════════
function utiliserCouleursWindows() {
  // Méthode 1 : CSS accent-color (Edge/Chrome sur Windows 11)
  var accentHex = getWindowsAccentCSS();

  if (accentHex) {
    appliquerAccentWindows(accentHex);
  } else {
    // Méthode 2 : media query prefers-color-scheme + canvas trick
    accentHex = getAccentViaCanvas();
    if (accentHex) {
      appliquerAccentWindows(accentHex);
    } else {
      // Méthode 3 : demander à l'utilisateur de choisir dans le sélecteur
      toast('Détection auto non disponible — utilisez le sélecteur de couleur ci-dessous','var(--amber)');
      var status = document.getElementById('win-color-status');
      if (status) status.innerHTML = '⚠️ Ouvrez <strong>Paramètres Windows → Personnalisation → Couleurs</strong> puis copiez la couleur dans le sélecteur "Couleur d\'accentuation" ci-dessous.';
    }
  }
}

function getWindowsAccentCSS() {
  try {
    // Créer un élément temporaire et lire la couleur accent CSS du système
    var el = document.createElement('div');
    el.style.cssText = 'position:absolute;width:1px;height:1px;background:AccentColor;visibility:hidden';
    document.body.appendChild(el);
    var color = window.getComputedStyle(el).backgroundColor;
    document.body.removeChild(el);
    if (color && color !== 'rgba(0, 0, 0, 0)' && color !== 'transparent' && color.startsWith('rgb')) {
      return rgbStringToHex(color);
    }
  } catch(e) {}
  return null;
}

function getAccentViaCanvas() {
  try {
    // Lire la CSS variable --accent-color si disponible (Edge PWA)
    var accent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
    if (accent && accent.startsWith('#')) return accent;
    // Essayer accent-color via un input range
    var input = document.createElement('input');
    input.type = 'range';
    input.style.cssText = 'position:absolute;opacity:0;pointer-events:none';
    document.body.appendChild(input);
    var thumbColor = window.getComputedStyle(input).accentColor;
    document.body.removeChild(input);
    if (thumbColor && thumbColor !== 'auto' && thumbColor.startsWith('rgb')) {
      return rgbStringToHex(thumbColor);
    }
  } catch(e) {}
  return null;
}

function rgbStringToHex(rgb) {
  var m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!m) return null;
  return '#' + [m[1],m[2],m[3]].map(function(v) {
    return ('0'+parseInt(v).toString(16)).slice(-2);
  }).join('');
}

function appliquerAccentWindows(hex) {
  // Générer fond sombre harmonieux basé sur l'accent Windows
  var c = hexToRgb(hex);
  if (!c) return;
  // Fond : version très sombre de l'accent
  var fond = 'rgb('+Math.round(c.r*0.08)+','+Math.round(c.g*0.08)+','+Math.round(c.b*0.08)+')';
  // Sidebar : légèrement plus clair
  var sidebar = 'rgb('+Math.round(c.r*0.12)+','+Math.round(c.g*0.12)+','+Math.round(c.b*0.12)+')';
  // Carte : intermédiaire
  var carte = 'rgb('+Math.round(c.r*0.15)+','+Math.round(c.g*0.15)+','+Math.round(c.b*0.15)+')';

  DB.parametres = Object.assign(DB.parametres||{}, {
    theme: 'windows',
    couleurAccent: hex,
    couleurFond: fond,
    couleurSidebar: sidebar,
    couleurCarte: carte,
    windowsAccentColor: hex
  });
  saveData();
  appliquerTheme();
  render();
  toast('Couleur Windows appliquée : ' + hex + ' ✓');
}

function formatTelephoneWA(tel) {
  // Retire tout sauf les chiffres et le + initial
  return tel.replace(/[^\d+]/g,'').replace(/^\+/,'');
}

function buildMessage(tache) {
  var msg = '🏠 *FamilyOS — ' + DB.famille.nom + '*\n\n';
  msg += '📌 *Nouvelle tâche assignée*\n\n';
  msg += '📋 *' + tache.titre + '*\n';
  msg += '⚡ Priorité : ' + (tache.priorite||'Normale') + '\n';
  if (tache.echeance) msg += '📅 Échéance : ' + fmtDate(tache.echeance) + '\n';
  if (tache.categorie) msg += '📂 Catégorie : ' + tache.categorie + '\n';
  if (tache.description) msg += '📝 ' + tache.description + '\n';
  msg += '\n— FamilyOS';
  return msg;
}

function envoyerWhatsApp(tacheId, tel) {
  var tache = DB.taches.items.find(function(t){return t.id===tacheId;});
  if (!tache || !tel) return;
  var numero = formatTelephoneWA(tel);
  var msg = encodeURIComponent(buildMessage(tache));
  window.open('https://wa.me/' + numero + '?text=' + msg, '_blank');
  toast('WhatsApp ouvert ✓');
}

function envoyerSMS(tacheId, tel) {
  var tache = DB.taches.items.find(function(t){return t.id===tacheId;});
  if (!tache || !tel) return;
  var msg = encodeURIComponent(buildMessage(tache).replace(/\*/g,''));
  // sms: fonctionne sur Android, iOS et Windows (Phone Link)
  var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  var sep = isMobile && /iPhone|iPad/i.test(navigator.userAgent) ? '&' : '?';
  window.location.href = 'sms:' + tel + sep + 'body=' + msg;
  toast('SMS ouvert ✓');
}

      var isPast = r.date < new Date().toISOString().slice(0,10);

      html+='</div>';

  }
  html+='</div>';

  // ── MODALS ─────────────────────────────────────────────────────────────
  html += modalEglise();
  return html;
