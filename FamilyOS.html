// ── CALENDRIER 2 MOIS (dans Programme) ────────────────────────────────────
function renderCalendrierRotation2Mois(a) {
  if (!a.rotations || !a.rotations.length) return '';
  var moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0,10);
  var moisCourant = today.getMonth();
  var anneeCourante = today.getFullYear();
  var moisSuivant = moisCourant === 11 ? 0 : moisCourant + 1;
  var anneeSuivante = moisCourant === 11 ? anneeCourante + 1 : anneeCourante;
  var moisAfficher = [
    {mo: moisCourant,  yr: anneeCourante},
    {mo: moisSuivant,  yr: anneeSuivante}
  ];
  var html = '<div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html += '<div style="font-size:13px;font-weight:600;color:var(--text)">📆 Rotations — mois en cours & suivant</div>';
  html += '<button class="btn btn-outline btn-sm" onclick="switchTab({target:document.querySelector(\'[onclick*=\\\"eg-rotation\\\"]\')},\'eg-rotation\')" style="font-size:11px">Voir toutes →</button>';
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
  moisAfficher.forEach(function(item) {
    var mo = item.mo; var yr = item.yr;
    var nbJours = new Date(yr, mo+1, 0).getDate();
    var offset = (new Date(yr, mo, 1).getDay()+6)%7;
    var rotsMois = a.rotations.filter(function(r) {
      var d = new Date(r.date+'T12:00:00');
      return d.getMonth()===mo && d.getFullYear()===yr;
    });
    html += '<div style="background:var(--navy3);border-radius:12px;overflow:hidden">';
    html += '<div style="background:var(--navy4);padding:8px 14px;font-size:13px;font-weight:700;color:var(--text)">'+moisNoms[mo]+' '+yr+'</div>';
    html += '<div style="padding:10px">';
    // Jours de semaine
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
    ['L','M','M','J','V','S','D'].forEach(function(j,i){
      html += '<div style="text-align:center;font-size:10px;font-weight:600;color:'+(i===(getJourRencontre()+6)%7?'var(--gold)':'var(--text3)')+';padding:2px">'+j+'</div>';
    });
    html += '</div>';
    // Grille jours
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
    for (var i=0;i<offset;i++) html += '<div></div>';
    for (var d=1;d<=nbJours;d++) {
      var dateStr = yr+'-'+(mo+1<10?'0':'')+(mo+1)+'-'+(d<10?'0':'')+d;
      var jourSem = new Date(dateStr+'T12:00:00').getDay();
      var isJeudi = jourSem===getJourRencontre();
      var isToday2 = dateStr===todayStr;
      var isPast = dateStr<todayStr;
      var rot = isJeudi ? rotsMois.find(function(r){return r.date===dateStr;}) : null;
      if (isJeudi && rot) {
        var col = avatarColorStr(rot.directeur);
        var bg = isToday2?'rgba(212,168,67,.22)':(isPast?col+'18':col+'28');
        var border = isToday2?'2px solid var(--gold)':'1px solid '+col+'55';
        html += '<div style="background:'+bg+';border:'+border+';border-radius:6px;padding:3px 2px;text-align:center;'+(isPast?'opacity:.55':'')+'" title="'+rot.directeur+(rot.theme?' — '+rot.theme:'')+'">';
        html += '<div style="font-size:11px;font-weight:600;color:'+(isToday2?'var(--gold)':'var(--text2)')+';line-height:1.2">'+d+'</div>';
        html += '<div style="width:22px;height:22px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin:2px auto">'+rot.directeur.slice(0,1).toUpperCase()+'</div>';
        html += '<div style="font-size:9px;color:'+col+';font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+rot.directeur.split(' ')[0].slice(0,8)+'</div>';
        if (isToday2) html += '<div style="font-size:8px;color:var(--gold);font-weight:700">CE SOIR</div>';
        html += '</div>';
      } else if (isJeudi) {
        html += '<div style="background:var(--navy4);border:1px dashed var(--border);border-radius:6px;padding:3px 2px;text-align:center;opacity:.4"><div style="font-size:11px;color:var(--gold)">'+d+'</div></div>';
      } else {
        html += '<div style="padding:3px 2px;text-align:center"><div style="font-size:11px;color:'+(isToday2?'var(--gold)':'var(--text3)')+';font-weight:'+(isToday2?'700':'400')+'">'+d+'</div></div>';
      }
    }
    html += '</div>';
    // Mini liste jeudis
    if (rotsMois.length) {
      html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">';
      rotsMois.forEach(function(r) {
        var d2 = new Date(r.date+'T12:00:00');
        var c2 = avatarColorStr(r.directeur);
        var past2 = r.date<todayStr; var tod2 = r.date===todayStr;
        html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;'+(past2&&!tod2?'opacity:.5':'')+'">';
        html += '<div style="width:6px;height:6px;border-radius:50%;background:'+c2+';flex-shrink:0"></div>';
        html += '<span style="font-size:11px;color:var(--text3);min-width:30px">'+d2.getDate()+' '+['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'][d2.getMonth()]+'</span>';
        html += '<span style="font-size:12px;font-weight:600;color:'+(tod2?'var(--gold)':c2)+';flex:1">'+r.directeur+'</span>';
        html += '<input value="'+(r.theme||'')+'" onchange="updateRotationTheme(\''+r.id+'\',this.value)" style="font-size:10px;padding:2px 5px;border-radius:4px;border:1px solid var(--border);background:var(--navy4);color:var(--text2);width:80px" placeholder="Thème..."/>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div></div>';
  });
  html += '</div></div>';
  return html;
}

// ── CALENDRIER ROTATION ─────────────────────────────────────────────────────
function renderCalendrierRotation(a) {
  var html = '';
  var moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var joursNoms = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0,10);

  // Header
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  html += '<h3 style="font-size:15px">Programme tournant — '+JOURS_NOMS[getJourRencontre()]+'s</h3>';
  html += '<div style="display:flex;gap:8px">';
  html += '<button class="btn btn-gold btn-sm" onclick="genererRotation()">🔄 Générer (16 sem.)</button>';
  html += '<button class="btn btn-outline btn-sm" onclick="openModal(\'modal-eg-rotation-manuel\')">+ Manuel</button>';
  html += '</div></div>';

  if (!a.membres.length) {
    return html + '<div class="empty">Ajoutez d\'abord vos membres dans l\'onglet Membres puis cliquez Générer.</div>';
  }
  if (!a.rotations.length) {
    return html + '<div style="text-align:center;padding:32px;background:var(--navy3);border-radius:12px"><div style="font-size:32px;margin-bottom:10px">🔄</div><div style="font-size:14px;color:var(--text2);margin-bottom:16px">Chaque membre dirige à tour de rôle chaque '+JOURS_NOMS[getJourRencontre()].toLowerCase()+'.</div><button class="btn btn-gold" onclick="genererRotation()">🔄 Générer le programme tournant</button></div>';
  }

  // Prochaine rencontre banner
  var prochain = a.rotations.find(function(r){ return r.date >= todayStr; });
  if (prochain) {
    var col0 = avatarColorStr(prochain.directeur);
    html += '<div style="margin-bottom:16px;background:rgba(154,106,218,.1);border:1px solid rgba(154,106,218,.3);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
    html += '<span style="font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.5px">Prochaine rencontre</span>';
    html += '<span style="font-size:16px;font-weight:700;color:var(--gold)">'+fmtDate(prochain.date)+'</span>';
    html += '<div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:'+col0+'22;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+col0+'">'+prochain.directeur.slice(0,1).toUpperCase()+'</div>';
    html += '<span style="font-size:14px;font-weight:600;color:var(--text)">'+prochain.directeur+'</span></div>';
    if (prochain.theme) html += '<span style="font-size:12px;color:var(--text3)">📖 '+prochain.theme+'</span>';
    html += '</div>';
  }

  // Regrouper rotations par année/mois
  var parAnnee = {};
  a.rotations.forEach(function(r) {
    var d = new Date(r.date+'T12:00:00');
    var yr = d.getFullYear(); var mo = d.getMonth();
    if (!parAnnee[yr]) parAnnee[yr] = {};
    if (!parAnnee[yr][mo]) parAnnee[yr][mo] = [];
    parAnnee[yr][mo].push(r);
  });

  Object.keys(parAnnee).sort().forEach(function(yr) {
    html += '<div style="margin-bottom:24px">';
    html += '<div style="font-size:13px;font-weight:700;color:var(--gold);padding:8px 0;margin-bottom:12px;border-bottom:1px solid var(--border)">'+yr+'</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">';

    Object.keys(parAnnee[yr]).sort(function(a,b){return Number(a)-Number(b);}).forEach(function(mo) {
      var rotsMois = parAnnee[yr][mo];
      var nbJours = new Date(Number(yr), Number(mo)+1, 0).getDate();
      var premier = new Date(Number(yr), Number(mo), 1);
      var offset = (premier.getDay()+6)%7; // lundi=0

      html += '<div style="background:var(--navy3);border-radius:12px;overflow:hidden">';
      // En-tête mois
      html += '<div style="background:var(--navy4);padding:8px 14px;font-size:12px;font-weight:700;color:var(--text);letter-spacing:.3px">'+moisNoms[Number(mo)]+'</div>';

      // Grille jours de la semaine
      html += '<div style="padding:10px">';
      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
      ['L','M','M','J','V','S','D'].forEach(function(j,i){
        html += '<div style="text-align:center;font-size:10px;font-weight:600;color:'+(i===(getJourRencontre()+6)%7?'var(--gold)':'var(--text3)')+';padding:2px">'+j+'</div>';
      });
      html += '</div>';

      // Cellules
      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
      // Cases vides avant
      for (var i=0;i<offset;i++) html += '<div></div>';

      for (var d=1;d<=nbJours;d++) {
        var dateStr = yr+'-'+(Number(mo)+1<10?'0':'')+(Number(mo)+1)+'-'+(d<10?'0':'')+d;
        var jourSemaine = new Date(dateStr+'T12:00:00').getDay(); // 4 = jeudi
        var isJeudi = jourSemaine === getJourRencontre();
        var isToday2 = dateStr === todayStr;
        var isPast = dateStr < todayStr;
        var rot = isJeudi ? rotsMois.find(function(r){return r.date===dateStr;}) : null;

        if (isJeudi && rot) {
          var col = avatarColorStr(rot.directeur);
          var bg = isToday2 ? 'rgba(212,168,67,.22)' : isPast ? col+'18' : col+'28';
          var border = isToday2 ? '2px solid var(--gold)' : '1px solid '+col+'55';
          var initiale = rot.directeur.slice(0,1).toUpperCase();
          var prenomCourt = rot.directeur.split(' ')[0].slice(0,8);
          html += '<div style="background:'+bg+';border:'+border+';border-radius:6px;padding:3px 2px;text-align:center;cursor:default;'+(isPast?'opacity:.55':'')+'" title="'+rot.directeur+(rot.theme?' — '+rot.theme:'')+'">';
          html += '<div style="font-size:11px;font-weight:600;color:'+(isToday2?'var(--gold)':'var(--text2)')+';line-height:1.2">'+d+'</div>';
          html += '<div style="width:22px;height:22px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin:2px auto">'+initiale+'</div>';
          html += '<div style="font-size:9px;color:'+col+';font-weight:600;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+prenomCourt+'</div>';
          if (isToday2) html += '<div style="font-size:8px;color:var(--gold);font-weight:700">CE SOIR</div>';
          html += '</div>';
        } else if (isJeudi) {
          // Jeudi sans rotation
          html += '<div style="background:var(--navy4);border:1px dashed var(--border);border-radius:6px;padding:3px 2px;text-align:center;opacity:.5">';
          html += '<div style="font-size:11px;color:var(--gold);font-weight:600">'+d+'</div>';
          html += '<div style="font-size:9px;color:var(--text3)">—</div>';
          html += '</div>';
        } else {
          // Jour normal (non jeudi)
          html += '<div style="padding:3px 2px;text-align:center">';
          html += '<div style="font-size:11px;color:'+(isToday2?'var(--gold)':'var(--text3)')+';font-weight:'+(isToday2?'700':'400')+'">'+d+'</div>';
          html += '</div>';
        }
      }
      html += '</div>'; // grid jours

      // Légende du mois (noms complets des jeudis)
      html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">';
      rotsMois.forEach(function(r) {
        var d2 = new Date(r.date+'T12:00:00');
        var col2 = avatarColorStr(r.directeur);
        var past2 = r.date < todayStr;
        var today2 = r.date === todayStr;
        html += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;'+(past2&&!today2?'opacity:.5':'')+'">';
        html += '<div style="width:6px;height:6px;border-radius:50%;background:'+col2+';flex-shrink:0"></div>';
        html += '<span style="font-size:11px;color:var(--text3);min-width:32px">'+d2.getDate()+' '+['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'][d2.getMonth()]+'</span>';
        html += '<span style="font-size:12px;font-weight:600;color:'+(today2?'var(--gold)':col2)+';flex:1">'+r.directeur+'</span>';
        if (r.theme) html += '<span style="font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px">'+r.theme+'</span>';
        if (today2) html += '<span style="font-size:9px;background:rgba(212,168,67,.2);color:var(--gold);padding:1px 5px;border-radius:8px;font-weight:700">CE SOIR</span>';
        // Champ thème inline
        html += '<input value="'+(r.theme||'')+'" onchange="updateRotationTheme(\''+r.id+'\',this.value)" style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--navy4);color:var(--text2);width:70px" placeholder="Thème..."/>';
        html += '</div>';
      });
      html += '</div>'; // légende

      html += '</div></div>'; // padding + card mois
    });
    html += '</div></div>'; // grid + année
  });

  return html;
}

// ── RÉCAP ANNUEL ──────────────────────────────────────────────────────────
function renderRecapAnnuel() {
  var a = getAutres();
  if (!a.rotations || !a.rotations.length) return '';

  var moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var today = new Date(); today.setHours(0,0,0,0);
  var todayStr = today.toISOString().slice(0,10);

  // Grouper les rotations par année puis par mois
  var parAnnee = {};
  a.rotations.forEach(function(r) {
    var d = new Date(r.date+'T12:00:00');
    var yr = d.getFullYear();
    var mo = d.getMonth();
    if (!parAnnee[yr]) parAnnee[yr] = {};
    if (!parAnnee[yr][mo]) parAnnee[yr][mo] = [];
    parAnnee[yr][mo].push(r);
  });

  var html = '';
  html += '<div style="margin-top:24px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html += '<div style="font-size:14px;font-weight:600;color:var(--text)">📆 Récapitulatif annuel des rotations</div>';
  html += '<div style="display:flex;gap:10px;font-size:11px;color:var(--text3)">';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--navy3);display:inline-block;border:1px solid var(--border)"></span>Passé</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(212,168,67,.25);display:inline-block"></span>Aujourd\'hui</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(154,106,218,.15);display:inline-block"></span>À venir</span>';
  html += '</div></div>';

  Object.keys(parAnnee).sort().forEach(function(yr) {
    html += '<div style="margin-bottom:20px">';
    html += '<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">📅 '+yr+'</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">';

    Object.keys(parAnnee[yr]).sort(function(a,b){return a-b;}).forEach(function(mo) {
      var rotsMois = parAnnee[yr][mo];
      html += '<div style="background:var(--navy3);border-radius:10px;padding:12px 14px">';
      html += '<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">'+moisNoms[mo]+'</div>';

      rotsMois.forEach(function(r) {
        var isPast  = r.date < todayStr;
        var isToday = r.date === todayStr;
        var col     = avatarColorStr(r.directeur);
        var bg      = isToday
          ? 'rgba(212,168,67,.18)'
          : isPast
            ? 'transparent'
            : 'rgba(154,106,218,.1)';
        var borderColor = isToday
          ? 'rgba(212,168,67,.5)'
          : isPast
            ? 'var(--border)'
            : 'rgba(154,106,218,.3)';
        var d = new Date(r.date+'T12:00:00');
        var joursNoms = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
        var dateLabel = joursNoms[d.getDay()]+' '+d.getDate();

        html += '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:'+bg+';border:1px solid '+borderColor+'">';
        // Date
        html += '<div style="font-size:12px;font-weight:600;color:'+(isToday?'var(--gold)':isPast?'var(--text3)':'var(--text2)')+';min-width:46px">'+dateLabel+'</div>';
        // Séparateur
        html += '<div style="width:1px;height:24px;background:var(--border)"></div>';
        // Avatar + nom
        html += '<div style="width:24px;height:24px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+col+';flex-shrink:0">'+r.directeur.slice(0,1).toUpperCase()+'</div>';
        html += '<div style="flex:1;min-width:0">';
        html += '<div style="font-size:13px;font-weight:500;color:'+(isPast&&!isToday?'var(--text3)':'var(--text)')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.directeur+'</div>';
        if (r.theme) html += '<div style="font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.theme+'</div>';
        html += '</div>';
        // Badge statut
        if (isToday) {
          html += '<span style="font-size:10px;background:rgba(212,168,67,.2);color:var(--gold);padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0">Ce soir</span>';
        } else if (isPast) {
          html += '<span style="font-size:10px;color:var(--text3);flex-shrink:0">✓</span>';
        } else {
          var diffMs = new Date(r.date+'T12:00:00') - today;
          var diffJ  = Math.round(diffMs/86400000);

      });

    });

  });
  html += '</div>';

}

function genererRotation(){
  var a=getAutres();
  if(!a.membres.length) return toast('Ajoutez des membres d\'abord','var(--red2)');
  var jour=getJourRencontre();
  var d=new Date();
  var diff=(jour-d.getDay()+7)%7||7;
  d.setDate(d.getDate()+diff);
  var finAnnee = new Date(d.getFullYear(), 11, 31);
  a.rotations=[];
  var i=0;
  while(d<=finAnnee){
    var dateStr=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    var m=a.membres[i%a.membres.length];
    a.rotations.push({id:uid(),date:dateStr,directeur:m.prenom,theme:''});
    d.setDate(d.getDate()+7);
    i++;
  }
  saveData();render();toast('Programme généré jusqu\'au 31 décembre — '+a.rotations.length+' rencontres ✓');
}

var AUTH_KEY = 'familyos_auth_v1';
var SESSION_KEY = 'familyos_session_v1';
var LOG_KEY = 'familyos_log_v1';
var SESSION_DURATION = 8 * 60 * 60 * 1000; // 8 heures

function loadAuth() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY)) || {comptes:[], actif:false}; }
  catch(e) { return {comptes:[], actif:false}; }
}
function saveAuth(auth) { localStorage.setItem(AUTH_KEY, JSON.stringify(auth)); }

function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; }
  catch(e) { return []; }
}
function saveLog(log) { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }

function enregistrerConnexion(prenom, role, succes, raison) {
  var log = loadLog();
  var ua = navigator.userAgent;
  var appareil = 'Ordinateur';
  if (/Android/i.test(ua)) appareil = 'Android';
  else if (/iPhone|iPad/i.test(ua)) appareil = 'iPhone/iPad';
  else if (/Windows/i.test(ua)) appareil = 'Windows';
  else if (/Mac/i.test(ua)) appareil = 'Mac';
  var navigateur = 'Navigateur';
  if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) navigateur = 'Chrome';
  else if (/Firefox/i.test(ua)) navigateur = 'Firefox';
  else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) navigateur = 'Safari';
  else if (/Edge/i.test(ua)) navigateur = 'Edge';
  log.unshift({
    id: uid(),
    prenom: prenom,
    role: role || '?',
    succes: succes,
    raison: raison || '',
    date: new Date().toISOString(),
    appareil: appareil,
    navigateur: navigateur
  });
  // Garder seulement les 200 derniers
  if (log.length > 200) log = log.slice(0, 200);
  saveLog(log);
}

function hashPin(pin) {
  // Simple hash pour le PIN (non cryptographique mais suffisant pour usage local)
  var h = 0;
  for (var i = 0; i < pin.length; i++) {
    h = ((h << 5) - h) + pin.charCodeAt(i);
    h |= 0;
  }
  return 'fp_' + Math.abs(h).toString(36) + pin.length;
}

function getSession() {
  try {
    var s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (s && s.expiry > Date.now()) return s;
    sessionStorage.removeItem(SESSION_KEY);
    return null;
  } catch(e) { return null; }
}
function setSession(prenom, role) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({
    prenom: prenom, role: role, expiry: Date.now() + SESSION_DURATION
  }));
}
function clearSession() { sessionStorage.removeItem(SESSION_KEY); }

var loginPrenom = '';

function creerCompteAdmin() {
  var p = document.getElementById('setup-prenom').value.trim();
  var pin = document.getElementById('setup-pin').value;
  var pin2 = document.getElementById('setup-pin2').value;
  var err = document.getElementById('setup-err');
  if (!p) { err.textContent = 'Saisissez votre prénom.'; return; }
  if (pin.length < 4) { err.textContent = 'Le PIN doit contenir au moins 4 caractères.'; return; }
  if (pin !== pin2) { err.textContent = 'Les deux PIN ne correspondent pas.'; return; }
  var auth = {actif: true, comptes: [{id: uid(), prenom: p, role: 'admin', pinHash: hashPin(pin)}]};
  saveAuth(auth);
  enregistrerConnexion(p, 'admin', true, 'Création du compte administrateur');
  setSession(p, 'admin');
  document.getElementById('auth-overlay').remove();
  toast('Bienvenue ' + p + ' ! Compte créé ✓');
  demarrerApp();
}

function selectionnerMembre(prenom) {
  loginPrenom = prenom;
  document.getElementById('login-members').style.display = 'none';
  document.getElementById('login-pin-area').style.display = 'block';
  document.getElementById('login-who').textContent = 'Bonjour ' + prenom + ' — entrez votre PIN';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-err').textContent = '';
  setTimeout(function(){ document.getElementById('login-pin').focus(); }, 100);
}

function retourChoix() {
  loginPrenom = '';
  document.getElementById('login-members').style.display = 'grid';
  document.getElementById('login-pin-area').style.display = 'none';
}

function validerConnexion() {
  var pin = document.getElementById('login-pin').value;
  var err = document.getElementById('login-err');
  if (!pin) { err.textContent = 'Saisissez votre PIN.'; return; }
  var auth = loadAuth();
  var compte = auth.comptes.find(function(c){ return c.prenom === loginPrenom; });
  if (!compte) { err.textContent = 'Compte introuvable.'; return; }
  if (compte.pinHash !== hashPin(pin)) {
    enregistrerConnexion(loginPrenom, compte.role, false, 'PIN incorrect');
    err.textContent = 'PIN incorrect. Réessayez.';
    document.getElementById('login-pin').value = '';
    document.getElementById('login-pin').focus();
    return;
  }
  enregistrerConnexion(loginPrenom, compte.role, true, '');
  setSession(loginPrenom, compte.role);
  document.getElementById('auth-overlay').remove();
  toast('Bienvenue ' + loginPrenom + ' !');
  demarrerApp();
}

function fmtDateHeure(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('fr-CA') + ' à ' + d.toLocaleTimeString('fr-CA', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return iso; }
}

function renderJournal(log, filtre) {
  if (!log.length) return '<div class="empty">Aucun événement enregistré.</div>';
  var filtered = filtre === 'succes' ? log.filter(function(l){ return l.succes && l.raison !== 'Déconnexion manuelle' && l.raison !== 'Session reprise'; })
    : filtre === 'echec' ? log.filter(function(l){ return !l.succes && l.raison !== 'Déconnexion manuelle'; })
    : filtre === 'deconnexion' ? log.filter(function(l){ return l.raison === 'Déconnexion manuelle'; })
    : filtre ? log.filter(function(l){ return l.prenom === filtre; })
    : log;
  if (!filtered.length) return '<div class="empty">Aucun résultat pour ce filtre.</div>';
  var html = '<div class="table-wrap"><table>';
  html += '<tr><th>Date & Heure</th><th>Utilisateur</th><th>Rôle</th><th>Appareil</th><th>Navigateur</th><th>Statut</th></tr>';
  filtered.forEach(function(l) {
    var col = avatarColor(l.prenom);
    var isDeconn = l.raison === 'Déconnexion manuelle';
    var isReprise = l.raison === 'Session reprise';
    var statutLabel, statutClass;
    if (isDeconn)      { statutLabel = '🔴 Déconnexion';    statutClass = 'badge-gray'; }
    else if (isReprise){ statutLabel = '🔵 Session reprise'; statutClass = 'badge-blue'; }
    else if (l.succes) { statutLabel = '🟢 Connexion';       statutClass = 'badge-green'; }
    else               { statutLabel = '🔴 PIN incorrect';   statutClass = 'badge-red'; }
    html += '<tr>';
    html += '<td style="font-size:12px;white-space:nowrap;color:var(--text2)">'+fmtDateHeure(l.date)+'</td>';
    html += '<td><div style="display:flex;align-items:center;gap:7px"><div style="width:26px;height:26px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+col+'">'+l.prenom.slice(0,1).toUpperCase()+'</div><span style="font-weight:500;font-size:13px">'+l.prenom+'</span></div></td>';
    html += '<td style="font-size:11px;color:var(--text3)">'+(l.role==='admin'?'👑 Admin':'👤 Membre')+'</td>';
    html += '<td style="font-size:12px">'+l.appareil+'</td>';
    html += '<td style="font-size:12px">'+l.navigateur+'</td>';
    html += '<td><span class="badge '+statutClass+'" style="font-size:10px;white-space:nowrap">'+statutLabel+'</span></td>';
    html += '</tr>';
  });
  html += '</table></div>';
  return html;
}

function activerPresence(prenom) {
  var ref = rtdb.ref('presence/' + prenom);
  var ua  = navigator.userAgent;
  var appareil = /Android/i.test(ua)?'Android':/iPhone|iPad/i.test(ua)?'iPhone':/Windows/i.test(ua)?'Windows':'Ordinateur';
  ref.set({online:true, lastSeen:firebase.database.ServerValue.TIMESTAMP, appareil:appareil});
  ref.onDisconnect().update({online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP});
  // Écouter tous les membres
  rtdb.ref('presence').on('value', function(snap) {
    presenceOnline = snap.val() || {};

    var sidebar = document.getElementById('chat-presence-area');
    if (sidebar) renderPresenceSidebar();
  });

// ── ACTIONS FIREBASE CHAT ─────────────────────────────────────────────────
function initFirebaseChat() {
  var session = getSession();
  if (!session) return;
  var moi = session.prenom;

  // Créer canal général si absent
  db.collection('chat_conversations').doc('general').set({
    id: 'general', nom: 'Famille — Général', type: 'general', icone: '🏠', creePar: '', creeAt: new Date().toISOString()
  }, {merge: true});

  // Écouter les conversations
  if (chatConvListener) chatConvListener();
  chatConvListener = db.collection('chat_conversations').orderBy('creeAt','asc').onSnapshot(function(snap) {
    var convs = [];
    snap.forEach(function(d) { convs.push(d.data()); });
    renderConvList(convs, moi);
  }, function() {
    // Fallback si pas connecté
    renderConvList([{id:'general',nom:'Famille — Général',type:'general',icone:'🏠'}], moi);
  });

  // S'abonner aux messages de la conv active
  abonnerMessages(chatConvActive, moi);
  renderPresenceSidebar();
}

function renderConvList(convs, moi) {
  var auth = loadAuth();
  var area = document.getElementById('chat-conv-list');
  if (!area) return;
  var html = '';

  // Conversations depuis Firestore
  convs.forEach(function(conv) {
    var estMembre = conv.type==='general' || (conv.membres && conv.membres.indexOf(moi)>=0);
    if (!estMembre) return;
    var isActive = conv.id === chatConvActive;
    var col = conv.type==='prive' ? avatarColor(conv.nom) : null;
    html += '<div onclick="changerConversation(\''+conv.id+'\')" style="cursor:pointer;padding:9px 10px;border-radius:9px;margin-bottom:3px;background:'+(isActive?'var(--navy4)':'transparent')+';border:1px solid '+(isActive?'var(--border)':'transparent')+'">';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    if (col) {
      html += '<div style="width:32px;height:32px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+col+';flex-shrink:0">'+conv.nom.slice(0,1).toUpperCase()+'</div>';
    } else {
      html += '<span style="font-size:20px;flex-shrink:0">'+conv.icone+'</span>';
    }
    html += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+conv.nom+'</div>';
    html += '<div style="font-size:10px;color:var(--text3)">'+(conv.type==='general'?'Tous les membres':conv.type==='prive'?'Message privé':'Groupe')+'</div></div></div></div>';
  });

  // Conversations privées avec chaque membre
  auth.comptes.forEach(function(c) {
    if (c.prenom === moi) return;
    var privId = [moi, c.prenom].sort().join('__');
    var alreadyShown = convs.find(function(cv){return cv.id===privId;});
    if (alreadyShown) return;
    var isActive = privId === chatConvActive;
    var col = avatarColor(c.prenom);
    var p = presenceOnline[c.prenom] || {};
    html += '<div onclick="ouvrirConvPrivee(\''+c.prenom+'\')" style="cursor:pointer;padding:9px 10px;border-radius:9px;margin-bottom:3px;background:'+(isActive?'var(--navy4)':'transparent')+';border:1px solid '+(isActive?'var(--border)':'transparent')+'">';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    html += '<div style="position:relative;width:32px;height:32px">';
    html += '<div style="width:32px;height:32px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+col+'">'+c.prenom.slice(0,1).toUpperCase()+'</div>';
    html += '<div style="position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:'+(p.online?'#3DAA7A':'#888')+';border:2px solid var(--navy3)"></div>';
    html += '</div>';
    html += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:var(--text)">'+c.prenom+'</div>';
    html += '<div style="font-size:10px;color:'+(p.online?'#3DAA7A':'var(--text3)')+'">'+( p.online?'En ligne':'Hors ligne')+'</div></div></div></div>';
  });

  area.innerHTML = html || '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">Aucune conversation</div>';
}

function abonnerMessages(convId, moi) {
  // Désabonner l'ancien listener
  if (chatMsgListener) { chatMsgListener(); chatMsgListener = null; }

  // Mettre à jour l'en-tête
  var header = document.getElementById('chat-header');
  if (header) {
    var icons = {general:'🏠'};
    var nomConv = convId === 'general' ? 'Famille — Général' : convId.includes('__') ? convId.replace(moi,'').replace('__','') : convId;
    header.innerHTML = '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">'+(icons[convId]||'💬')+'</span><div><div style="font-size:14px;font-weight:600;color:var(--text)">'+nomConv+'</div><div style="font-size:11px;color:var(--text3)">Conversation en temps réel</div></div></div>';
  }

  // Écouter les messages en temps réel
  chatMsgListener = db.collection('chat_messages').doc(convId).collection('msgs')
    .orderBy('date','asc').limit(100)
    .onSnapshot(function(snap) {
      var msgs = [];
      snap.forEach(function(d) { msgs.push(d.data()); });
      afficherMessages(msgs, moi);
    }, function(err) {
      var el = document.getElementById('chat-messages');
      if (el) el.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;margin:auto">⚠️ Connexion Firebase perdue. Vérifiez internet.</div>';
    });
}

function afficherMessages(msgs, moi) {
  var el = document.getElementById('chat-messages');
  if (!el) return;
  if (!msgs.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;margin:auto">Aucun message — soyez le premier ! 👋</div>';
    return;
  }
  var html = '';
  var prevDate = '';
  msgs.forEach(function(msg) {
    var isMoi = msg.auteur === moi;
    var col = avatarColor(msg.auteur);
    var dateMsg = new Date(msg.date);
    var dateStr = dateMsg.toLocaleDateString('fr-CA');
    if (dateStr !== prevDate) {
      html += '<div style="text-align:center;margin:6px 0"><span style="font-size:11px;background:var(--navy3);color:var(--text3);padding:3px 12px;border-radius:20px">'+dateStr+'</span></div>';
      prevDate = dateStr;
    }
    html += '<div style="display:flex;flex-direction:'+(isMoi?'row-reverse':'row')+';align-items:flex-end;gap:7px">';
    if (!isMoi) html += '<div style="width:28px;height:28px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+col+';flex-shrink:0">'+msg.auteur.slice(0,1).toUpperCase()+'</div>';
    html += '<div style="max-width:65%">';
    if (!isMoi) html += '<div style="font-size:10px;color:var(--text3);margin-bottom:2px;margin-left:4px">'+msg.auteur+'</div>';
    html += '<div style="background:'+(isMoi?'var(--gold)':'var(--navy3)')+';color:'+(isMoi?'#1A1A2E':'var(--text)')+';padding:9px 13px;border-radius:'+(isMoi?'18px 18px 4px 18px':'18px 18px 18px 4px')+';font-size:13px;line-height:1.5;word-break:break-word;max-width:100%">';
    if (msg.type === 'image' && msg.fileData) {
      html += '<img src="'+msg.fileData+'" alt="'+( msg.fileName||'image')+'" style="max-width:220px;max-height:220px;border-radius:8px;display:block;cursor:pointer" onclick="ouvrirImageChat(this.src)" />';
      if (msg.texte && msg.texte !== msg.fileName) html += '<div style="margin-top:6px;font-size:12px;opacity:.8">'+msg.texte.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    } else if (msg.type === 'fichier' && msg.fileData) {
      var icFich = msg.fileName && msg.fileName.match(/\\.pdf$/i)?'📄':msg.fileName && msg.fileName.match(/\\.xlsx?$/i)?'📊':msg.fileName && msg.fileName.match(/\\.docx?$/i)?'📝':'📎';
      var sizeFich = msg.fileSize ? (msg.fileSize>1024*1024?(msg.fileSize/1024/1024).toFixed(1)+'Mo':(msg.fileSize/1024).toFixed(0)+'Ko') : '';
      html += '<a href="'+msg.fileData+'" download="'+(msg.fileName||'fichier')+'" style="display:flex;align-items:center;gap:8px;color:inherit;text-decoration:none;padding:4px 0">';
      html += '<span style="font-size:22px">'+icFich+'</span>';
      html += '<div><div style="font-size:13px;font-weight:600;word-break:break-all">'+(msg.fileName||'Fichier')+'</div>';
      html += '<div style="font-size:11px;opacity:.7">'+sizeFich+' · Cliquer pour télécharger</div></div></a>';
      if (msg.texte && msg.texte !== msg.fileName) html += '<div style="margin-top:4px;font-size:12px;opacity:.8">'+msg.texte.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    } else {
      html += msg.texte.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
    html += '</div>';
    html += '<div style="font-size:10px;color:var(--text3);margin-top:2px;text-align:'+(isMoi?'right':'left')+';margin-'+(isMoi?'right':'left')+':4px">'+dateMsg.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'})+(isMoi?' ✓':'')+'</div>';
    html += '</div></div>';
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function changerConversation(convId) {
  chatConvActive = convId;
  var moi = getSession() ? getSession().prenom : '';
  marquerConvLue(convId);
  abonnerMessages(convId, moi);
  var inp = document.getElementById('chat-input');
  if (inp) inp.focus();
}

function ouvrirImageChat(src) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  overlay.onclick = function(){ overlay.remove(); };
  var img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.8)';
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

function ouvrirConvPrivee(autrePrenom) {
  var moi = getSession() ? getSession().prenom : '';
  var privId = [moi, autrePrenom].sort().join('__');
  db.collection('chat_conversations').doc(privId).set({
    id:privId, nom:autrePrenom, type:'prive', icone:'👤', membres:[moi,autrePrenom], creePar:moi, creeAt:new Date().toISOString()
  }, {merge:true});
  chatConvActive = privId;
  abonnerMessages(privId, moi);
}

var chatFichierEnAttente = null;

function previewFichierChat(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Fichier trop grand (max 5 Mo)', 'var(--red2)'); input.value = ''; return; }
  chatFichierEnAttente = file;
  var preview = document.getElementById('chat-file-preview');
  if (preview) {
    var icone = file.type.startsWith('image/') ? '🖼️' : file.name.match(/\.pdf$/i) ? '📄' : file.name.match(/\.xlsx?$/i) ? '📊' : file.name.match(/\.docx?$/i) ? '📝' : '📎';
    var sizeStr = file.size > 1024*1024 ? (file.size/1024/1024).toFixed(1)+'Mo' : (file.size/1024).toFixed(0)+'Ko';
    preview.innerHTML = icone+' <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+file.name+'</span><span style="color:var(--text3);flex-shrink:0">'+sizeStr+'</span><button onclick="annulerFichierChat()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;line-height:1">×</button>';
    preview.style.display = 'flex';
  }
}

function annulerFichierChat() {
  chatFichierEnAttente = null;
  var preview = document.getElementById('chat-file-preview');
  if (preview) preview.style.display = 'none';
  var input = document.getElementById('chat-file-input');
  if (input) input.value = '';
}

function envoyerMessage() {
  var session = getSession();
  if (!session) return;
  if (chatFichierEnAttente) {
    var inp = document.getElementById('chat-input');
    envoyerFichier(chatFichierEnAttente, inp ? inp.value.trim() : '');
    return;
  }
  var inp = document.getElementById('chat-input');
  var texte = inp ? inp.value.trim() : '';
  if (!texte) return;
  db.collection('chat_messages').doc(chatConvActive).collection('msgs').add({
    id: uid(), auteur: session.prenom, texte: texte,
    date: new Date().toISOString(), type: 'texte', convId: chatConvActive
  });
  if (inp) { inp.value = ''; inp.style.height = 'auto'; inp.focus(); }
  envoyerNotifChat(session.prenom, texte, chatConvActive);
}

function envoyerFichier(file, commentaire) {
  var session = getSession();
  if (!session) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var isImage = file.type.startsWith('image/');
    db.collection('chat_messages').doc(chatConvActive).collection('msgs').add({
      id: uid(), auteur: session.prenom,
      texte: commentaire || file.name,
      date: new Date().toISOString(),
      type: isImage ? 'image' : 'fichier',
      fileName: file.name, fileType: file.type,
      fileSize: file.size, fileData: e.target.result,
      convId: chatConvActive
    });
    annulerFichierChat();
    var inp = document.getElementById('chat-input');
    if (inp) { inp.value = ''; inp.style.height = 'auto'; inp.focus(); }
    envoyerNotifChat(session.prenom, '📎 '+file.name, chatConvActive);
  };
  reader.readAsDataURL(file);
}

function envoyerNotifChat(auteur, texte, convId) {
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      new Notification('💬 FamilyOS — Nouveau message', {
        body: auteur+' : '+texte.slice(0, 80),
        icon: './icon-192.png', badge: './icon-192.png',
        tag: 'chat-'+convId, renotify: true
      });
    } catch(e) {}
  }
  setTimeout(majBadgeChat, 1500);
}

function demanderPermissionNotif() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(function(p) {
      if (p === 'granted') toast('Notifications activées ✓');
    });
  }
}

function majBadgeChat() {
  var session = getSession();
  if (!session) return;
  var moi = session.prenom;
  db.collection('chat_messages').get().then(function(snapshot) {
    var totalNonLus = 0;
    var promises = [];
    snapshot.forEach(function(convDoc) {
      var convId = convDoc.id;
      if (currentPage === 'chat' && convId === chatConvActive) return;
      var dl = localStorage.getItem('chat_lu_'+convId+'_'+moi) || '1970-01-01T00:00:00.000Z';
      promises.push(
        db.collection('chat_messages').doc(convId).collection('msgs')
          .where('date', '>', dl).get().then(function(msgs) {
            msgs.forEach(function(m){ if (m.data().auteur !== moi) totalNonLus++; });
          })
      );
    });
    Promise.all(promises).then(function() {
      var navBtn = document.querySelector('[data-page="chat"]');
      if (!navBtn) return;
      var badge = navBtn.querySelector('.chat-badge');
      if (totalNonLus > 0) {
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'chat-badge';
          badge.style.cssText = 'position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;pointer-events:none';
          navBtn.style.position = 'relative';
          navBtn.appendChild(badge);
        }
        badge.textContent = totalNonLus > 99 ? '99+' : String(totalNonLus);
      } else if (badge) {
        badge.remove();
      }
    });
  }).catch(function() {});
}

function marquerConvLue(convId) {
  var session = getSession();
  if (!session) return;
  localStorage.setItem('chat_lu_'+convId+'_'+session.prenom, new Date().toISOString());
  setTimeout(majBadgeChat, 500);
}

function envoyerEmoji(emoji) {
  var inp = document.getElementById('chat-input');
  if (inp) { inp.value += emoji; inp.focus(); }
}

function chatKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); envoyerMessage(); }
}

function creerGroupe() {
  var nom = document.getElementById('conv-nom').value.trim();
  var icone = document.getElementById('conv-icone').value || '💬';
  if (!nom) return toast('Saisissez un nom', 'var(--red2)');
  var cases = document.querySelectorAll('#modal-new-conv input[type="checkbox"]:checked');
  var membres = [getSession().prenom];
  cases.forEach(function(c){ membres.push(c.value); });
  if (membres.length < 2) return toast('Ajoutez au moins un autre membre', 'var(--red2)');
  var convId = 'grp_' + uid();
  db.collection('chat_conversations').doc(convId).set({
    id:convId, nom:nom, type:'groupe', icone:icone, membres:membres, creePar:getSession().prenom, creeAt:new Date().toISOString()
  });
  closeModal('modal-new-conv');
  chatConvActive = convId;
  toast('Groupe "'+nom+'" créé ✓');
}

function supprimerConversation(convId) {
  if (!confirm('Supprimer cette conversation ?')) return;
  db.collection('chat_conversations').doc(convId).delete();
  chatConvActive = 'general';
  render();
  toast('Conversation supprimée', 'var(--red2)');

function sauverHypState() {
  var get = function(id){ var el=document.getElementById(id); return el?el.value:null; };
  // Lire depuis le DOM si les éléments existent
  if (get('hyp-prix') !== null) {
    hypState.prix     = parseFloat(get('hyp-prix'))        || hypState.prix;
    hypState.mise     = parseFloat(get('hyp-mise'))        || hypState.mise;
    hypState.misePct  = parseFloat(get('hyp-mise-pct'))    || hypState.misePct;
    hypState.taux     = parseFloat(get('hyp-taux'))        || hypState.taux;
    hypState.amort    = parseInt(get('hyp-amort-periode')) || hypState.amort;
    hypState.terme    = parseInt(get('hyp-terme'))         || hypState.terme;
    hypState.freq     = get('hyp-freq')                    || hypState.freq;
    hypState.typeTaux = get('hyp-type-taux')               || hypState.typeTaux;
    hypState.province = get('hyp-province')                || hypState.province;
  }
  // Persister dans sessionStorage
  try { sessionStorage.setItem(HYP_STATE_KEY, JSON.stringify(hypState)); } catch(e) {}
}

function tauxMensuelCanadien(tauxAnnuel, type) {
  var r = tauxAnnuel / 100;
  if (type === 'fixe') { var ear = Math.pow(1+r/2,2)-1; return Math.pow(1+ear,1/12)-1; }
  return r / 12;
}

function calcHypotheque() {
  var prix=parseFloat(document.getElementById('hyp-prix').value)||0;
  var mise=parseFloat(document.getElementById('hyp-mise').value)||0;
  var taux=parseFloat(document.getElementById('hyp-taux').value)||0;
  var amort=parseInt(document.getElementById('hyp-amort-periode').value)||25;
  var terme=parseInt(document.getElementById('hyp-terme').value)||5;
  var freqVal=document.getElementById('hyp-freq').value;
  var typeTaux=document.getElementById('hyp-type-taux').value;
  var cmhcMsg=document.getElementById('hyp-cmhc-msg');
  var cmhc=0;

  // ── Règles canadiennes de mise de fonds minimale ──────────────────
  var miseMin = getMiseMin(prix);
  var misePctMin = prix > 0 ? (miseMin / prix * 100) : 5;

  // Mettre à jour le min du champ % dynamiquement
  var pctField = document.getElementById('hyp-mise-pct');
  if (pctField) pctField.min = misePctMin.toFixed(2);
  majHintPctMin(prix);

  // Auto-corriger si en dessous du minimum
  if (mise < miseMin - 0.5) {
    document.getElementById('hyp-mise').value = Math.round(miseMin);
    document.getElementById('hyp-mise-pct').value = misePctMin.toFixed(1);
    mise = miseMin;
    var infoMin = prix >= 1500000

function majFraisMensuels() {
  var ids = ['hypotheque','impot','dettes','energie','assurance','telephone','cable','internet','condo'];
  var total = 0;
  ids.forEach(function(id) {
    var el = document.getElementById('fm-'+id);
    total += el ? (parseFloat(el.value)||0) : 0;
  });
  var totalEl = document.getElementById('fm-total');
  var revenuEl = document.getElementById('fm-revenu');
  if (totalEl) totalEl.textContent = '$' + Math.round(total).toLocaleString('fr-CA');
  // Ratio ABD (Amortissement Brut de la Dette) ≤ 32% recommandé par CMHC
  // Versements logement seuls / revenu brut ≤ 32%
  var hypEl = document.getElementById('fm-hypotheque');
  var impotEl = document.getElementById('fm-impot');
  var assurEl = document.getElementById('fm-assurance');
  var fraisLogement = (hypEl?parseFloat(hypEl.value)||0:0) + (impotEl?parseFloat(impotEl.value)||0:0) + (assurEl?parseFloat(assurEl.value)||0:0);
  var revenuMinABD = fraisLogement > 0 ? fraisLogement / 0.32 : 0;
  // Ratio ATD (Amortissement Total de la Dette) ≤ 44%
  var revenuMinATD = total > 0 ? total / 0.44 : 0;
  var revenuMin = Math.max(revenuMinABD, revenuMinATD);
  if (revenuEl) revenuEl.textContent = revenuMin > 0 ? '$'+Math.round(revenuMin).toLocaleString('fr-CA') : '—';
}
function getMiseMin(prix) {
  if (prix <= 500000) return prix * 0.05;
  if (prix < 1500000) return 500000 * 0.05 + (prix - 500000) * 0.10;
  return prix * 0.20;
}

function getMiseMin(prix) {
  if (prix <= 500000) return prix * 0.05;
  if (prix < 1500000) return 500000 * 0.05 + (prix - 500000) * 0.10;
  return prix * 0.20;
}

// Changement du montant $ → recalcule le %
function syncMisePct() {
  var p = parseFloat(document.getElementById('hyp-prix').value) || 0;
  var m = parseFloat(document.getElementById('hyp-mise').value) || 0;
  var pct = p > 0 ? (m / p * 100) : 0;
  document.getElementById('hyp-mise-pct').value = pct.toFixed(2);
  majHintPctMin(p);
  calcHypotheque();
}

// Frappe libre dans le champ % → met à jour $ en temps réel sans bloquer
function syncMiseMontant() {
  var p = parseFloat(document.getElementById('hyp-prix').value) || 0;
  var pc = parseFloat(document.getElementById('hyp-mise-pct').value) || 0;
  if (p > 0 && pc > 0) {
    document.getElementById('hyp-mise').value = Math.round(p * pc / 100);
  }
  calcHypotheque();
}

// Met à jour le hint et le min du champ %
function majHintPctMin(prix) {
  var miseMin = getMiseMin(prix);
  var pctMin = prix > 0 ? (miseMin / prix * 100) : 5;
  var pctField = document.getElementById('hyp-mise-pct');
  var hint = document.getElementById('hyp-pct-hint');
  if (pctField) pctField.min = pctMin.toFixed(2);
  if (hint) {
    var regle = prix >= 1500000
      ? 'Prix ≥ 1,5M$ — min. 20%'
      : prix > 500000
        ? 'Règle 5%+10% — min. '+pctMin.toFixed(2)+'% ('+fmtMoney(miseMin)+')'
        : 'Min. 5% — '+fmtMoney(miseMin);
    hint.textContent = '📌 Minimum requis : '+pctMin.toFixed(2)+'%  |  '+regle;
  }
}

// Validation au blur (quand on quitte le champ %) → refuse si < minimum
function validerPctMise() {
  var p = parseFloat(document.getElementById('hyp-prix').value) || 0;
  var pc = parseFloat(document.getElementById('hyp-mise-pct').value) || 0;
  var miseMin = getMiseMin(p);
  var pctMin = p > 0 ? (miseMin / p * 100) : 5;
  var cmhcMsg = document.getElementById('hyp-cmhc-msg');
  var pctEl = document.getElementById('hyp-mise-pct');

  if (pc < pctMin - 0.001) {
    // Corriger au minimum et signaler visuellement
    pctEl.value = pctMin.toFixed(2);
    document.getElementById('hyp-mise').value = Math.round(miseMin);

    var msgErr = p >= 1500000
      ? '❌ Minimum requis : 20% ('+fmtMoney(miseMin)+') — prix ≥ 1,5M$. Valeur corrigée.'
      : p > 500000
        ? '❌ Minimum requis : '+pctMin.toFixed(2)+'% = '+fmtMoney(miseMin)+' (règle 5%+10%). Valeur corrigée.'
        : '❌ Minimum requis : 5% = '+fmtMoney(miseMin)+'. Valeur corrigée.';
    if (cmhcMsg) cmhcMsg.innerHTML = '<span style="color:var(--red)">'+msgErr+'</span>';

    // Flash rouge sur le champ
    pctEl.style.borderColor = 'var(--red)';
    pctEl.style.background = 'rgba(224,85,85,.12)';
    setTimeout(function() {
      pctEl.style.borderColor = '';
      pctEl.style.background = '';
    }, 2500);
  }
  calcHypotheque();
}

function genererTableauAmort(){
  if(!hypCache.principal){document.getElementById('hyp-amort-table').innerHTML='<div class="empty">Calculez d\'abord dans l\'onglet Calculateur.</div>';return;}
  var c=hypCache;var solde=c.principal,tInt=0,tPrinc=0;
  var rows='';
  for(var an=1;an<=c.amort;an++){
    var iA=0,pA=0;
    for(var p=0;p<c.freqNum;p++){if(solde<=0)break;var ip=solde*c.rp,pp=Math.min(c.paiement-ip,solde);if(pp<0)pp=0;iA+=ip;pA+=pp;solde-=pp;if(solde<0.01)solde=0;}
    tInt+=iA;tPrinc+=pA;
    var isT=an===c.terme;
    rows+='<tr style="'+(isT?'background:rgba(212,168,67,.08);font-weight:600':'')+'"><td style="color:'+(isT?'var(--gold)':'var(--text2)')+'">'+an+(isT?' ★':'')+'</td>';
    rows+='<td style="color:var(--green)">'+fmtMoney(pA)+'</td><td style="color:var(--red)">'+fmtMoney(iA)+'</td>';
    rows+='<td>'+fmtMoney(c.paiement*c.freqNum)+'</td><td style="color:'+(isT?'var(--gold)':'')+'">'+fmtMoney(Math.max(0,solde))+'</td>';
    rows+='<td>'+(isT?'<span class="badge badge-gold" style="font-size:10px">Fin du terme</span>':'')+'</td></tr>';
    if(solde<=0)break;
  }
  var html='<div class="table-wrap"><table>';
  html+='<tr><th>Année</th><th>Capital remboursé</th><th>Intérêts payés</th><th>Total annuel</th><th>Solde restant</th><th></th></tr>';
  html+=rows;
  html+='<tr style="background:var(--navy3);font-weight:700"><td>TOTAL</td><td style="color:var(--green)">'+fmtMoney(tPrinc)+'</td><td style="color:var(--red)">'+fmtMoney(tInt)+'</td><td>'+fmtMoney(tPrinc+tInt)+'</td><td>—</td><td></td></tr>';
  html+='</table></div>';
  document.getElementById('hyp-amort-table').innerHTML=html;
}

function calcTaxes(){
  var prix=parseFloat(document.getElementById('tax-prix').value)||0;
  var province=document.getElementById('tax-province').value;
  var premier=document.getElementById('tax-premier').value==='oui';
  var taxe=0,remboursement=0,details=[];
  function tr(base,paliers){var t=0;paliers.forEach(function(p){if(base>p[0]){var m=Math.min(base,p[1]!==null?p[1]:base)-p[0];t+=m*p[2];details.push({de:p[0],a:p[1],taux:p[2]*100,montant:m*p[2]});}});return t;}
  if(province==='QC'){taxe=tr(prix,[[0,55200,0.005],[55200,276200,0.01],[276200,552300,0.015],[552300,1104700,0.02],[1104700,null,0.025]]);if(premier)remboursement=Math.min(taxe,5000);}
  else if(province==='ON'){taxe=tr(prix,[[0,55000,0.005],[55000,250000,0.01],[250000,400000,0.015],[400000,2000000,0.02],[2000000,null,0.025]]);if(premier)remboursement=Math.min(taxe,4000);}
  else if(province==='BC'){taxe=tr(prix,[[0,200000,0.01],[200000,2000000,0.02],[2000000,3000000,0.03],[3000000,null,0.05]]);if(premier&&prix<=835000)remboursement=prix<=500000?taxe:taxe*(835000-prix)/335000;}
  else if(province==='AB'){taxe=Math.max(50,Math.ceil(prix/5000)*5)*10/1000;details.push({de:0,a:null,taux:0,montant:taxe,label:'Frais d\'enregistrement'});}
  else if(province==='MB'){taxe=tr(prix,[[0,30000,0],[30000,90000,0.005],[90000,150000,0.01],[150000,200000,0.015],[200000,null,0.02]]);}
  else if(province==='SK'){taxe=prix*0.003;details.push({de:0,a:null,taux:0.3,montant:taxe});}
  else if(province==='NS'){taxe=prix*0.015;details.push({de:0,a:null,taux:1.5,montant:taxe});}
  else if(province==='NB'){taxe=prix*0.01;details.push({de:0,a:null,taux:1.0,montant:taxe});}
  else if(province==='PE'){taxe=prix*0.01;details.push({de:0,a:null,taux:1.0,montant:taxe});}
  else if(province==='NL'){taxe=tr(prix,[[0,500,0.004],[500,1000,0.008],[1000,null,0.016]]);}
  var net=Math.max(0,taxe-remboursement);
  var provNames={'QC':'Québec','ON':'Ontario','BC':'Colombie-Britannique','AB':'Alberta','MB':'Manitoba','SK':'Saskatchewan','NS':'Nouvelle-Écosse','NB':'Nouveau-Brunswick','PE':'Île-du-Prince-Édouard','NL':'Terre-Neuve'};
  var html='<div class="card" style="padding:18px">';
  html+='<div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:8px">'+provNames[province]+'</div>';
  html+='<div style="font-size:28px;font-weight:700;color:var(--red);margin-bottom:4px">'+fmtMoney(net)+'</div>';
  html+='<div style="font-size:12px;color:var(--text3);margin-bottom:12px">Droits de mutation nets</div>';
  if(details.length&&province!=='AB'&&province!=='SK'&&province!=='NS'&&province!=='NB'&&province!=='PE'){
    html+='<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">PAR TRANCHE :</div>';
    details.forEach(function(d){if(d.montant>0)html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--text3)">'+(d.a?fmtMoney(d.de)+' → '+fmtMoney(d.a):'Au-delà de '+fmtMoney(d.de))+' ('+d.taux.toFixed(1)+'%)</span><span style="font-weight:600">'+fmtMoney(d.montant)+'</span></div>';});
  }
  if(remboursement>0)html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;color:var(--green)"><span>🎁 Remboursement premier acheteur</span><span style="font-weight:600">-'+fmtMoney(remboursement)+'</span></div>';
  html+='<hr style="border:none;border-top:1px solid var(--border);margin:8px 0"/>';
  html+='<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700"><span>TOTAL NET</span><span style="color:var(--red)">'+fmtMoney(net)+'</span></div>';
  var inspection=500,notaire=1500,ajust=prix*0.003;
  html+='<div style="margin-top:12px;background:var(--navy3);border-radius:8px;padding:10px 12px">';
  html+='<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">AUTRES FRAIS DE CLÔTURE ESTIMÉS</div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span style="color:var(--text3)">Inspection préachat</span><span>~'+fmtMoney(inspection)+'</span></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span style="color:var(--text3)">Notaire / Frais juridiques</span><span>~'+fmtMoney(notaire)+'</span></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span style="color:var(--text3)">Ajustements de taxes</span><span>~'+fmtMoney(ajust)+'</span></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding:6px 0;border-top:0.5px solid var(--border);margin-top:4px"><span>Total estimé (clôture)</span><span style="color:var(--amber)">~'+fmtMoney(net+inspection+notaire+ajust)+'</span></div>';
  html+='</div></div>';
  document.getElementById('tax-resultats').innerHTML=html;
}

var HYP_SAVE_KEY='familyos_hyp_calcs_v1';
function loadCalcsHyp(){try{return JSON.parse(localStorage.getItem(HYP_SAVE_KEY))||[];}catch(e){return[];}}
function saveCalcsHyp(d){localStorage.setItem(HYP_SAVE_KEY,JSON.stringify(d));}
function sauvegarderCalcHyp(){
  if(!hypCache.principal)return toast('Faites d\'abord un calcul','var(--red2)');
  var c=hypCache;var label=prompt('Nom de ce calcul :','Maison '+fmtMoney(c.prix));
  if(!label)return;
  var calcs=loadCalcsHyp();
  calcs.unshift({label:label,date:new Date().toLocaleDateString('fr-CA'),prix:c.prix,mise:c.mise,misePct:Math.round(c.misePct*10)/10,taux:c.taux,amort:c.amort,terme:c.terme,paiement:fmtMoney(c.paiement)+' / '+c.freqLabel,interetTotal:c.interetTotal,totalPaye:c.totalPaye});
  if(calcs.length>20)calcs=calcs.slice(0,20);
  saveCalcsHyp(calcs);toast('Calcul sauvegardé ✓');
}
function supprimerCalcHyp(idx){var c=loadCalcsHyp();c.splice(idx,1);saveCalcsHyp(c);render();toast('Supprimé','var(--red2)');}
function effacerCalcsHyp(){if(!confirm('Effacer tous les calculs ?'))return;saveCalcsHyp([]);render();toast('Effacé ✓');}
function imprimerAmortissement(){
  if(!hypCache.principal)return toast('Aucun calcul à imprimer','var(--amber)');
  var c=hypCache;var win=window.open('','_blank','width=800,height=900');
  if(!win)return toast('Autorisez les popups','var(--amber)');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Amortissement FamilyOS</title><style>body{font-family:Arial,sans-serif;max-width:720px;margin:30px auto;color:#1A1A2E}h1{color:#D4A843;border-bottom:2px solid #D4A843;padding-bottom:8px}table{width:100%;border-collapse:collapse;font-size:12px}th{background:#1E3A5F;color:#D4A843;padding:8px}td{padding:7px 8px;border-bottom:1px solid #eee}tr.t{background:#fff8e1;font-weight:700}.g{color:#1A7A4A}.r{color:#A32D2D}@media print{button{display:none}}</style></head><body>';
  html+='<h1>🏡 Tableau d\'amortissement — FamilyOS</h1>';
  html+='<p><strong>Prix :</strong> '+fmtMoney(c.prix)+' | <strong>Mise :</strong> '+c.misePct.toFixed(1)+'% | <strong>Taux :</strong> '+c.taux+'% '+c.typeTaux+' | <strong>Amortissement :</strong> '+c.amort+' ans</p>';
  html+='<p><strong>Paiement '+c.freqLabel+' :</strong> '+fmtMoney(c.paiement)+'</p>';
  html+='<button onclick="window.print()" style="padding:8px 20px;background:#D4A843;color:#1A1A2E;border:none;border-radius:8px;cursor:pointer;margin-bottom:16px">🖨 Imprimer</button>';
  html+='<table><tr><th>Année</th><th>Capital remboursé</th><th>Intérêts payés</th><th>Total annuel</th><th>Solde restant</th></tr>';
  var solde=c.principal,tI=0,tP=0;
  for(var an=1;an<=c.amort;an++){var iA=0,pA=0;for(var p=0;p<c.freqNum;p++){if(solde<=0)break;var ip=solde*c.rp,pp=Math.min(c.paiement-ip,solde);if(pp<0)pp=0;iA+=ip;pA+=pp;solde-=pp;if(solde<0.01)solde=0;}tI+=iA;tP+=pA;html+='<tr class="'+(an===c.terme?'t':'')+'"><td>'+an+(an===c.terme?' ★':'')+'</td><td class="g">'+fmtMoney(pA)+'</td><td class="r">'+fmtMoney(iA)+'</td><td>'+fmtMoney(c.paiement*c.freqNum)+'</td><td>'+fmtMoney(Math.max(0,solde))+'</td></tr>';if(solde<=0)break;}
  html+='<tr style="font-weight:700;background:#f5f0ff"><td>TOTAL</td><td class="g">'+fmtMoney(tP)+'</td><td class="r">'+fmtMoney(tI)+'</td><td>'+fmtMoney(tP+tI)+'</td><td>—</td></tr></table>';
  html+='<p style="font-size:11px;color:#888;margin-top:16px">★ = Fin du terme '+c.terme+' an(s). Généré par FamilyOS · '+new Date().toLocaleDateString('fr-CA')+'</p></body></html>';
  win.document.write(html);win.document.close();
}
