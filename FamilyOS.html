  html += '<span style="margin-left:8px">🔴 = En retard</span>';
  html += '</div>';
  return html;
}

// ── GANTT ──────────────────────────────────────────────────────────────────
function renderGantt() {
  var html = '';
  var today = new Date(); today.setHours(0,0,0,0);
  // Rassembler tâches + objectifs avec dates
  var items = [];
  DB.taches.items.forEach(function(t){
    if (t.echeance) {
      var debut = t.debut ? new Date(t.debut+'T12:00:00') : new Date(today.getTime()-7*86400000);
      items.push({id:t.id,nom:t.titre,debut:debut,fin:new Date(t.echeance+'T12:00:00'),type:'tache',priorite:t.priorite,statut:t.statut,responsable:t.responsable||''});
    }
  });
  DB.objectifs.projets.forEach(function(p){
    if (p.echeance) {
      var debut = p.debut ? new Date(p.debut+'T12:00:00') : new Date(today.getTime()-14*86400000);
      items.push({id:p.id,nom:p.nom,debut:debut,fin:new Date(p.echeance+'T12:00:00'),type:'objectif',priorite:p.priorite,statut:p.statut,pct:p.pct||0,responsable:p.responsable||''});
    }
  });
  if (!items.length) {
    return '<div class="empty">Aucune tâche ou objectif avec date d\'échéance.<br>Ajoutez des dates pour voir le Gantt.</div>';
  }
  // Calculer plage de dates
  var minDate = items.reduce(function(m,i){return i.debut<m?i.debut:m;}, items[0].debut);
  var maxDate = items.reduce(function(m,i){return i.fin>m?i.fin:m;}, items[0].fin);
  minDate = new Date(Math.min(minDate.getTime(), today.getTime()-7*86400000));
  maxDate = new Date(Math.max(maxDate.getTime(), today.getTime()+7*86400000));
  var totalDays = Math.ceil((maxDate-minDate)/(86400000));
  var scale = Math.max(1, Math.min(3, 840/totalDays)); // px par jour, max 3
  var barW = Math.round(totalDays*scale);
  // Header
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html += '<span style="font-size:13px;color:var(--text2)">'+items.length+' éléments · tâches et objectifs</span>';
  html += '<button class="btn btn-gold btn-sm" onclick="openModal(\'modal-tache\')">+ Tâche</button>';
  html += '</div>';
  // Conteneur scroll
  html += '<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">';
  // Timeline header — semaines
  var LBL_W = 180;
  html += '<div style="display:flex;background:var(--navy3);border-bottom:1px solid var(--border);min-width:'+(LBL_W+barW+20)+'px">';
  html += '<div style="width:'+LBL_W+'px;flex-shrink:0;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3)">ÉLÉMENT</div>';
  html += '<div style="flex:1;position:relative;height:32px;overflow:hidden">';
  // Générer étiquettes semaines
  var cur = new Date(minDate);
  while (cur <= maxDate) {
    var x = Math.round((cur-minDate)/86400000*scale);
    var lbl = cur.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});
    html += '<div style="position:absolute;left:'+x+'px;top:8px;font-size:10px;color:var(--text3);white-space:nowrap">'+lbl+'</div>';
    cur = new Date(cur.getTime()+7*86400000);
  }
  html += '</div></div>';
  // Lignes
  items.forEach(function(item,idx) {
    var isOdd = idx%2===0;
    var startX = Math.max(0,Math.round((item.debut-minDate)/86400000*scale));
    var endX = Math.round((item.fin-minDate)/86400000*scale);
    var width = Math.max(8, endX-startX);
    var barColor = item.type==='objectif' ? '#9A6ADA' : (PRIO_COLORS[item.priorite]||'#4A88D4');
    if (item.statut==='Terminé') barColor = '#3DAA7A';
    var retard = item.fin < today && item.statut!=='Terminé';
    if (retard) barColor = '#E05555';
    html += '<div style="display:flex;align-items:center;background:'+(isOdd?'var(--navy4)':'var(--navy3)')+';border-bottom:1px solid var(--border);min-width:'+(LBL_W+barW+20)+'px;min-height:38px">';
    html += '<div style="width:'+LBL_W+'px;flex-shrink:0;padding:6px 12px;overflow:hidden">';
    html += '<div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+item.nom+'">'+( item.type==='objectif'?'🎯 ':'')+item.nom+'</div>';
    html += '<div style="font-size:10px;color:var(--text3)">'+( item.responsable||'')+(item.pct!==undefined?' · '+item.pct+'%':'')+'</div>';
    html += '</div>';
    // Barre
    html += '<div style="flex:1;position:relative;height:38px;padding:6px 0">';
    // Ligne aujourd'hui
    var todayX = Math.round((today-minDate)/86400000*scale);
    if (todayX>=0 && todayX<=barW) html += '<div style="position:absolute;left:'+todayX+'px;top:0;bottom:0;width:1px;background:rgba(212,168,67,.5)"></div>';
    // Barre tâche
    html += '<div style="position:absolute;left:'+startX+'px;top:8px;width:'+width+'px;height:22px;background:'+barColor+';border-radius:4px;display:flex;align-items:center;overflow:hidden" title="'+item.nom+' · '+fmtDate(item.debut.toISOString().slice(0,10))+' → '+fmtDate(item.fin.toISOString().slice(0,10))+'">';
    if (item.pct) html += '<div style="height:100%;width:'+item.pct+'%;background:rgba(255,255,255,.25);border-radius:4px 0 0 4px"></div>';
    html += '<span style="position:absolute;left:6px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden">'+item.nom.slice(0,22)+'</span>';
    html += '</div>';
    html += '</div></div>';
  });
  html += '</div>';
  // Légende
  html += '<div style="display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--text3);flex-wrap:wrap">';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#E05555;display:inline-block"></span>Haute / Retard</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#D4A843;display:inline-block"></span>Moyenne</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#4A88D4;display:inline-block"></span>Basse</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#9A6ADA;display:inline-block"></span>Objectif</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;border-radius:2px;background:#3DAA7A;display:inline-block"></span>Terminé</span>';
  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:1px;height:12px;background:rgba(212,168,67,.7);display:inline-block"></span>Aujourd\'hui</span>';
  html += '</div>';
  return html;
}

function calNav(dir) {
  if (dir===0) { calMois=new Date().getMonth(); calAnnee=new Date().getFullYear(); }
  else { calMois+=dir; if(calMois>11){calMois=0;calAnnee++;} if(calMois<0){calMois=11;calAnnee--;} }
  document.getElementById('ta-agenda').innerHTML = renderCalendrier();
}
function changerStatutTache(id, statut) {
  var t = DB.taches.items.find(function(i){return i.id===id;});
  if (t) { t.statut=statut; saveData(); render(); }
}
function deplacerTache(id, statut) {
  var t = DB.taches.items.find(function(i){return i.id===id;});
  if (t) { t.statut=statut; saveData(); document.getElementById('ta-kanban').innerHTML = renderKanban(); toast('Déplacé vers "'+statut+'" ✓'); }
}
function ajouterColonneKanban() {
  var nom = document.getElementById('kc-nom').value.trim();
  var color = document.getElementById('kc-color').value;
  if (!nom) return toast('Saisissez un nom','var(--red2)');
  if (!DB.taches.kanbanCols) DB.taches.kanbanCols=['À faire','En cours','En attente','Bloqué','Terminé'];
  if (!DB.taches.kanbanColors) DB.taches.kanbanColors={};
  if (DB.taches.kanbanCols.indexOf(nom)<0) DB.taches.kanbanCols.splice(DB.taches.kanbanCols.length-1,0,nom);
  DB.taches.kanbanColors[nom]=color;
  saveData(); closeModal('modal-kanban-col');
  document.getElementById('ta-kanban').innerHTML = renderKanban();
  toast('Colonne ajoutée ✓');
}
function supprimerColonneKanban(nom) {
  if (!confirm('Supprimer la colonne "'+nom+'" ? Les tâches seront déplacées vers "À faire".')) return;
  DB.taches.kanbanCols = DB.taches.kanbanCols.filter(function(c){return c!==nom;});
  DB.taches.items.forEach(function(t){if(t.statut===nom)t.statut='À faire';});
  saveData(); document.getElementById('ta-kanban').innerHTML = renderKanban(); toast('Colonne supprimée ✓','var(--red2)');
}

function renderCashflow() {
  var periodeEl = document.getElementById('cf-periode');
  var modeEl    = document.getElementById('cf-mode');
  var nbMois    = periodeEl ? parseInt(periodeEl.value) : 6;
  var mode      = modeEl ? modeEl.value : 'mois';
  var txs       = DB.finances.transactions;
  var budgetTotal = DB.finances.budget.reduce(function(a,b){return a+Number(b.montant||0);},0);
  var budgetSemaine = budgetTotal / 4.33; // budget hebdomadaire estimé

  var periodes = [];
  var now = new Date();

  if (mode === 'semaine') {
    // Générer les semaines — nbMois mois = nbMois*4 semaines environ (max 26)
    var nbSem = Math.min(nbMois * 4, 26);
    // Trouver le lundi de la semaine courante
    var lundi = new Date(now);
    lundi.setDate(now.getDate() - ((now.getDay()+6)%7));
    lundi.setHours(0,0,0,0);
    for (var i = nbSem-1; i >= 0; i--) {
      var debut = new Date(lundi);
      debut.setDate(lundi.getDate() - i*7);
      var fin = new Date(debut);
      fin.setDate(debut.getDate() + 6);
      var labelSem = debut.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});
      periodes.push({debut:debut, fin:fin, label:labelSem, rev:0, dep:0, bud:budgetSemaine});
    }
    // Agréger par semaine
    txs.forEach(function(t) {
      if (!t.date) return;
      var d = new Date(t.date); d.setHours(12,0,0,0);
      var p = periodes.find(function(x){return d>=x.debut && d<=x.fin;});
      if (!p) return;
      if (t.type==='Revenu') p.rev += Number(t.montant||0);
      else p.dep += Number(t.montant||0);
    });
    var sub = document.getElementById('cf-subtitle');
    if (sub) sub.textContent = 'Vue hebdomadaire — '+nbSem+' semaines';
  } else {
    // Par mois
    for (var i = nbMois-1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      periodes.push({
        annee:d.getFullYear(), mois:d.getMonth(),
        label:d.toLocaleDateString('fr-CA',{month:'short',year:'2-digit'}),
        rev:0, dep:0, bud:budgetTotal
      });
    }
    txs.forEach(function(t) {
      if (!t.date) return;
      var d = new Date(t.date);
      var p = periodes.find(function(x){return x.annee===d.getFullYear()&&x.mois===d.getMonth();});
      if (!p) return;
      if (t.type==='Revenu') p.rev += Number(t.montant||0);
      else p.dep += Number(t.montant||0);
    });
    var sub = document.getElementById('cf-subtitle');
    if (sub) sub.textContent = 'Vue mensuelle — '+nbMois+' derniers mois';
  }

  // ── KPIs ──────────────────────────────────────────────────────────
  var totRev = periodes.reduce(function(a,p){return a+p.rev;},0);
  var totDep = periodes.reduce(function(a,p){return a+p.dep;},0);
  var net    = totRev - totDep;
  var setEl  = function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
  var setCol = function(id,c){var e=document.getElementById(id);if(e)e.style.color=c;};
  setEl('cf-rev-val', fmtMoney(totRev));
  setEl('cf-dep-val', fmtMoney(totDep));
  setEl('cf-bud-val', mode==='semaine' ? fmtMoney(budgetSemaine) : fmtMoney(budgetTotal));
  setEl('cf-bud-sub', mode==='semaine'
    ? 'Budget / semaine (estimé)'
    : 'Total période : '+fmtMoney(budgetTotal * nbMois));
  setEl('cf-net-val', (net>=0?'+':'')+fmtMoney(net));
  setCol('cf-net-val', net>=0?'var(--green)':'var(--red)');

  // ── TABLEAU ────────────────────────────────────────────────────────
  var table = document.getElementById('cf-table');
  if (table) {
    var label1 = mode==='semaine' ? 'Semaine' : 'Mois';
    var rows = '<tr><th>'+label1+'</th><th style="text-align:right;color:var(--green)">Revenus</th><th style="text-align:right;color:var(--red)">Dépenses</th><th style="text-align:right;color:var(--blue)">Budget prévu</th><th style="text-align:right">Solde net</th><th style="text-align:right">vs Budget</th></tr>';
    periodes.forEach(function(p) {
      var solde  = p.rev - p.dep;
      var vsBud  = p.dep - p.bud;
      rows += '<tr>';
      rows += '<td style="font-weight:600">'+p.label.toUpperCase()+'</td>';
      rows += '<td style="text-align:right;color:var(--green);font-weight:600">'+fmtMoney(p.rev)+'</td>';
      rows += '<td style="text-align:right;color:var(--red);font-weight:600">'+fmtMoney(p.dep)+'</td>';
      rows += '<td style="text-align:right;color:var(--blue)">'+fmtMoney(p.bud)+'</td>';
      rows += '<td style="text-align:right;font-weight:700;color:'+(solde>=0?'var(--green)':'var(--red)')+'">'+( solde>=0?'+':'')+fmtMoney(solde)+'</td>';
      rows += '<td style="text-align:right;font-size:12px;color:'+(vsBud>0?'var(--red)':'var(--green)')+'">'+( vsBud>0?'⬆️ +':' ✅ -')+fmtMoney(Math.abs(vsBud))+'</td>';
      rows += '</tr>';
    });
    table.innerHTML = rows;
  }

  // ── CANVAS ─────────────────────────────────────────────────────────
  var canvas = document.getElementById('cf-canvas');
  if (!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var cssW = canvas.parentElement.offsetWidth - 40 || 600;
  var cssH = 280;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, cssW, cssH);
  var W = cssW, H = cssH;

  // Détection thème
  var testEl = document.createElement('div');
  testEl.style.cssText = 'color:var(--text);position:absolute;visibility:hidden';
  document.body.appendChild(testEl);
  var rgb = getComputedStyle(testEl).color;
  document.body.removeChild(testEl);
  var vals = rgb.match(/\d+/g) || [200,200,200];
  var lum = 0.299*vals[0] + 0.587*vals[1] + 0.114*vals[2];
  var isDark = lum > 128;
  var colTexte  = isDark ? 'rgba(220,220,240,0.9)' : 'rgba(20,30,60,0.85)';
  var colGrille = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';

  var padL=68, padR=20, padT=24, padB=64;
  var chartW=W-padL-padR, chartH=H-padT-padB;
  var n = periodes.length;
  var allVals = [];
  periodes.forEach(function(p){allVals.push(p.rev,p.dep,p.bud);});
  var maxVal = Math.max.apply(null,allVals)*1.15 || 1000;
  var step = chartW/n;
  // Largeur des barres adaptée au nombre de périodes
  var barW = Math.max(4, Math.min(Math.floor(step*0.28), 40));

  // Fond zone graphique
  ctx.fillStyle = isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)';
  ctx.fillRect(padL, padT, chartW, chartH);

  // Grilles
  for (var g=0;g<=4;g++) {
    var gy = padT + chartH - (g/4)*chartH;
    ctx.strokeStyle = colGrille;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL,gy); ctx.lineTo(W-padR,gy); ctx.stroke();
    ctx.fillStyle = colTexte;
    ctx.font = 'bold 11px system-ui,sans-serif';
    ctx.textAlign = 'right';
    var numLabel = Math.round(maxVal*g/4);
    ctx.fillText((numLabel>=1000?(numLabel/1000).toFixed(1)+'k':numLabel)+'$', padL-6, gy+4);
  }

  var toY = function(v){ return padT + chartH - (Math.max(0,v)/maxVal)*chartH; };

  // Barres + labels
  periodes.forEach(function(p, i) {
    var cx = padL + i*step + step/2;

    // Barre revenus
    if (p.rev > 0) {
      var bRev = toY(p.rev);
      ctx.fillStyle='rgba(61,170,122,0.82)';
      ctx.fillRect(cx-barW-1, bRev, barW, padT+chartH-bRev);
    }
    // Barre dépenses
    if (p.dep > 0) {
      var bDep = toY(p.dep);
      ctx.fillStyle='rgba(224,85,85,0.82)';
      ctx.fillRect(cx+1, bDep, barW, padT+chartH-bDep);
    }
    // Label période
    ctx.fillStyle = colTexte;
    ctx.font = 'bold 10px system-ui,sans-serif';
    ctx.textAlign = 'center';
    // Rotation si trop de périodes
    if (n > 12) {
      ctx.save();
      ctx.translate(cx, H-padB+14);
      ctx.rotate(-Math.PI/4);
      ctx.fillText(p.label.toUpperCase(), 0, 0);
      ctx.restore();
    } else {
      ctx.fillText(p.label.toUpperCase(), cx, H-padB+16);
    }
    p._bY = toY(p.bud);
    p._cx = cx;
  });

  // Ligne budget
  ctx.strokeStyle='rgba(55,138,221,0.95)';
  ctx.lineWidth=2.5; ctx.setLineDash([7,4]);
  ctx.beginPath();
  periodes.forEach(function(p,i){ i===0?ctx.moveTo(p._cx,p._bY):ctx.lineTo(p._cx,p._bY); });
  ctx.stroke(); ctx.setLineDash([]);
  periodes.forEach(function(p) {
    ctx.fillStyle='#378ADD'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(p._cx,p._bY,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });

  // Ligne cashflow net
  ctx.strokeStyle='rgba(212,168,67,1)'; ctx.lineWidth=2.5;
  ctx.beginPath();
  periodes.forEach(function(p,i){
    var zY = padT+chartH;
    var ny = zY-((p.rev-p.dep)/maxVal)*chartH;
    ny = Math.max(padT, Math.min(zY, ny));
    i===0?ctx.moveTo(p._cx,ny):ctx.lineTo(p._cx,ny);
    p._netY = ny;
  });
  ctx.stroke();
  periodes.forEach(function(p) {
    var pos=(p.rev-p.dep)>=0;
    ctx.fillStyle=pos?'#D4A843':'#E05555'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(p._cx,p._netY,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });

  // Légende centrée
  var legendItems = [
    {col:'rgba(61,170,122,0.85)',label:'Revenus',bar:true},
    {col:'rgba(224,85,85,0.85)', label:'Dépenses',bar:true},
    {col:'rgba(55,138,221,0.95)',label:mode==='semaine'?'Budget/semaine':'Budget/mois',dash:true},
    {col:'rgba(212,168,67,1)',   label:'Cashflow net',line:true}
  ];
  ctx.font='12px system-ui,sans-serif';
  var totalLW = legendItems.reduce(function(a,l){return a+ctx.measureText(l.label).width+38;},0);
  var lx=(W-totalLW)/2, ly=H-12;
  legendItems.forEach(function(l) {
    if(l.bar){
      ctx.fillStyle=l.col;
      ctx.fillRect(lx, ly-11, 15, 11);
    } else if(l.dash){
      ctx.save(); ctx.setLineDash([5,3]);
      ctx.strokeStyle=l.col; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(lx,ly-5); ctx.lineTo(lx+15,ly-5); ctx.stroke();
      ctx.restore();
      ctx.fillStyle='#378ADD';
      ctx.beginPath(); ctx.arc(lx+7,ly-5,3,0,Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle=l.col; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(lx,ly-5); ctx.lineTo(lx+15,ly-5); ctx.stroke();
      ctx.fillStyle='#D4A843';
      ctx.beginPath(); ctx.arc(lx+7,ly-5,4,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle=colTexte;
    ctx.font='12px system-ui,sans-serif'; ctx.textAlign='left';
    ctx.fillText(l.label, lx+19, ly);
    lx += ctx.measureText(l.label).width+38;
  });
}

// BUDGET FAMILLE — SOUMISSIONS

var SOUM_KEY = 'familyos_budget_soumissions_v1';
function loadBudgetSoumissions() {
  try { return JSON.parse(localStorage.getItem(SOUM_KEY)) || []; } catch(e) { return []; }
}
function saveBudgetSoumissions(data) { localStorage.setItem(SOUM_KEY, JSON.stringify(data)); }

function soumettreBudget() {
  var session = getSession();
  if (!session) return;
  var cat    = document.getElementById('sb-cat').value.trim();
  var montant= parseFloat(document.getElementById('sb-montant').value) || 0;
  var note   = document.getElementById('sb-note').value.trim();
  if (!cat)    return toast('Saisissez une catégorie','var(--red2)');
  if (!montant)return toast('Saisissez un montant','var(--red2)');
  var mp = new Date(); mp.setMonth(mp.getMonth()+1);
  var moisCle = mp.getFullYear()+'-'+(mp.getMonth()+1);
  var soumissions = loadBudgetSoumissions();
  soumissions.push({
    id: uid(), membre: session.prenom, moisCle: moisCle,
    categorie: cat, montant: montant, note: note,
    statut: 'attente', date: new Date().toISOString(), commentaireAdmin: ''
  });
  saveBudgetSoumissions(soumissions);
  closeModal('modal-soumettre-budget');
  render();
  toast('Budget soumis pour approbation ✓');
}

function supprimerSoumission(id) {
  if (!confirm('Retirer cette soumission ?')) return;
  var soumissions = loadBudgetSoumissions().filter(function(s){return s.id!==id;});
  saveBudgetSoumissions(soumissions);
  render();
  toast('Soumission retirée','var(--red2)');
}

function traiterSoumission(id, statut) {
  var soumissions = loadBudgetSoumissions();
  var s = soumissions.find(function(x){return x.id===id;});
  if (!s) return;
  var commEl = document.getElementById('comm-'+id);
  s.statut = statut;
  s.commentaireAdmin = commEl ? commEl.value.trim() : '';
  s.dateTraitement = new Date().toISOString();
  saveBudgetSoumissions(soumissions);
  render();
  toast(statut==='approuve'?'Budget approuvé ✓':'Budget rejeté','var(--red2)');
}

function approuverTout() {
  if (!confirm('Approuver toutes les soumissions en attente ?')) return;
  var soumissions = loadBudgetSoumissions();
  soumissions.forEach(function(s){
    if (s.statut==='attente') { s.statut='approuve'; s.dateTraitement=new Date().toISOString(); }
  });
  saveBudgetSoumissions(soumissions);
  render();
  toast('Toutes les soumissions approuvées ✓');
}

function integrerBudgetApprouve() {
  var mp = new Date(); mp.setMonth(mp.getMonth()+1);
  var moisCle = mp.getFullYear()+'-'+(mp.getMonth()+1);
  var soumissions = loadBudgetSoumissions();
  var approuvees = soumissions.filter(function(s){return s.moisCle===moisCle && s.statut==='approuve';});
  if (!approuvees.length) return toast('Aucun budget approuvé à intégrer','var(--amber)');
  if (!confirm('Intégrer '+approuvees.length+' ligne(s) dans le budget mensuel ? Les lignes existantes de même catégorie seront mises à jour.')) return;
  approuvees.forEach(function(s) {
    var existing = DB.finances.budget.find(function(b){return b.categorie===s.categorie;});
    if (existing) {
      existing.montant = Number(existing.montant) + Number(s.montant);
    } else {
      DB.finances.budget.push({id:uid(), categorie:s.categorie, icone:'📌', montant:Number(s.montant)});
    }
    s.statut = 'integre';
  });
  saveBudgetSoumissions(soumissions);
  saveData();
  render();
  toast('Budget intégré avec succès ✓');
}

// ── CLÔTURE BUDGÉTAIRE ─────────────────────────────────────────────────────
function isBudgetCloture(annee, mois) {
  var locks = DB.finances.budgetLocks || [];
  return locks.some(function(l){ return l.moisCle === annee+'-'+mois; });
}

function cloturerBudget() {
  var s = getSession();
  if (!s || s.role !== 'admin') return toast('Réservé à l\'administrateur','var(--amber)');
  var now = new Date();
  var annee = now.getFullYear();
  var mois  = now.getMonth()+1;
  var moisCle = annee+'-'+mois;
  var label = now.toLocaleDateString('fr-CA',{month:'long',year:'numeric'});

  if (isBudgetCloture(annee, mois)) return toast('Ce mois est déjà clôturé','var(--amber)');
  if (!confirm('⚠️ Clôturer le budget de '+label+' ?\n\nAprès clôture :\n• Aucune modification de budget ni de transaction pour ce mois\n• Le rapport mensuel sera disponible\n• Vous pourrez toujours définir le budget du mois suivant\n\nCette action est irréversible (sauf déverrouillage admin).')) return;

  // Calculer les totaux du mois
  var txsMois = DB.finances.transactions.filter(function(t){
    var d = new Date(t.date);
    return d.getFullYear()===annee && (d.getMonth()+1)===mois;
  });
  var rev = txsMois.filter(function(t){return t.type==='Revenu';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
  var dep = txsMois.filter(function(t){return t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
  var budTotal = DB.finances.budget.reduce(function(a,b){return a+Number(b.montant||0);},0);

  // Archiver
  if (!DB.finances.archives) DB.finances.archives = [];
  DB.finances.archives.push({
    moisCle: moisCle, label: label, date: now.toISOString(), par: s.prenom,
    revenus: rev, depenses: dep, budgetTotal: budTotal,
    transactions: JSON.parse(JSON.stringify(txsMois)),
    budget: JSON.parse(JSON.stringify(DB.finances.budget))
  });

  // Verrouiller
  if (!DB.finances.budgetLocks) DB.finances.budgetLocks = [];
  DB.finances.budgetLocks.push({moisCle: moisCle, date: now.toISOString(), par: s.prenom});

  saveData();
  render();
  toast('Budget de '+label+' clôturé ✓');
}

function deverrouillerBudget(moisCle) {
  var s = getSession();
  if (!s || s.role !== 'admin') return;
  if (!confirm('Déverrouiller ce mois ? Les transactions pourront à nouveau être modifiées.')) return;
  DB.finances.budgetLocks = (DB.finances.budgetLocks||[]).filter(function(l){return l.moisCle!==moisCle;});
  saveData(); render(); toast('Mois déverrouillé ✓');
}

function verifierLockTransaction(date) {
  if (!date) return false;
  var d = new Date(date);
  var moisCle = d.getFullYear()+'-'+(d.getMonth()+1);
  return isBudgetCloture(d.getFullYear(), d.getMonth()+1);
}

function voirArchive(moisCle) {
  var arch = (DB.finances.archives||[]).find(function(a){return a.moisCle===moisCle;});
  if (!arch) return;
  var w = window.open('','_blank','width=900,height=700');
  if (!w) return toast('Autorisez les popups','var(--amber)');
  w.document.write(buildRapportHTML(arch, arch.label));
  w.document.close();

// ── RAPPORT FINANCIER ─────────────────────────────────────────────────────
function majRapportUI() {
  var type = document.getElementById('rpt-type').value;
  document.getElementById('rpt-mois-zone').style.display    = type==='mois'    ? '' : 'none';
  document.getElementById('rpt-periode-zone').style.display = type==='periode' ? '' : 'none';
  document.getElementById('rpt-archive-zone').style.display = type==='archive' ? '' : 'none';
}

function collecterDonneesRapport() {
  var type = document.getElementById('rpt-type').value;
  var txs = DB.finances.transactions;
  var budget = DB.finances.budget;
  var label = '', debut, fin;

  if (type === 'mois') {
    var moisVal = document.getElementById('rpt-mois').value; // "2026-04"
    if (!moisVal) return null;
    var parts = moisVal.split('-');
    var y = parseInt(parts[0]), m = parseInt(parts[1])-1;
    debut = new Date(y, m, 1);
    fin   = new Date(y, m+1, 0, 23, 59, 59);
    label = debut.toLocaleDateString('fr-CA',{month:'long',year:'numeric'});
    // Si archivé, utiliser les données archivées
    var arch = (DB.finances.archives||[]).find(function(a){return a.moisCle===(y+'-'+(m+1));});
    if (arch) { txs = arch.transactions; budget = arch.budget; }
  } else if (type === 'periode') {
    debut = new Date(document.getElementById('rpt-debut').value);
    fin   = new Date(document.getElementById('rpt-fin').value);
    fin.setHours(23,59,59);
    if (!debut || !fin || isNaN(debut) || isNaN(fin)) return null;
    label = 'Période du '+fmtDate(debut.toISOString().slice(0,10))+' au '+fmtDate(fin.toISOString().slice(0,10));
  } else {
    var sel = document.getElementById('rpt-archive-sel').value;
    var arch = (DB.finances.archives||[]).find(function(a){return a.moisCle===sel;});
    if (!arch) return null;
    txs = arch.transactions; budget = arch.budget;
    label = arch.label + ' (clôturé)';
    var archParts = sel.split('-');
    debut = new Date(parseInt(archParts[0]), parseInt(archParts[1])-1, 1);
    fin   = new Date(parseInt(archParts[0]), parseInt(archParts[1]), 0, 23, 59, 59);
  }

  var txsFiltrees = txs.filter(function(t){
    if (!t.date) return false;
    var d = new Date(t.date);
    return d >= debut && d <= fin;
  });

  var opts = {
    resume:    document.getElementById('rpt-inc-resume') ? document.getElementById('rpt-inc-resume').checked : true,
    budget:    document.getElementById('rpt-inc-budget') ? document.getElementById('rpt-inc-budget').checked : true,
    detail:    document.getElementById('rpt-inc-tx')     ? document.getElementById('rpt-inc-tx').checked : true,
    imprev:    document.getElementById('rpt-inc-imprev') ? document.getElementById('rpt-inc-imprev').checked : true
  };

  return {label:label, txs:txsFiltrees, budget:budget, opts:opts, debut:debut, fin:fin};
}

function aperçuRapport() {
  var data = collecterDonneesRapport();
  if (!data) return toast('Sélectionnez une période valide','var(--amber)');
  var apercu = document.getElementById('rpt-apercu');
  if (!apercu) return;
  apercu.style.display = '';
  apercu.innerHTML = '<div class="card" style="padding:18px">'+buildRapportInterne(data)+'</div>';
}

function genererRapportPeriode() {

  w.document.close();
}

function buildRapportInterne(data) {
  var txs = data.txs, budget = data.budget, opts = data.opts, label = data.label;
  var rev = txs.filter(function(t){return t.type==='Revenu';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
  var dep = txs.filter(function(t){return t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
  var net = rev - dep;
  var budTotal = budget.reduce(function(a,b){return a+Number(b.montant||0);},0);
  var html = '<div style="font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px">📄 '+label+'</div>';
  if (opts.resume) {
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">';
    html += kpiHyp('💚 Revenus',fmtMoney(rev),'var(--green)')+kpiHyp('🔴 Dépenses',fmtMoney(dep),'var(--red)')+kpiHyp('💰 Budget prévu',fmtMoney(budTotal),'var(--blue)')+kpiHyp('📊 Solde net',fmtMoney(net),net>=0?'var(--green)':'var(--red)');
    html += '</div>';
    html += '<div style="margin-bottom:16px"><div style="display:flex;border-radius:8px;overflow:hidden;height:22px">';
    var pctR = budTotal>0?Math.min(rev/budTotal*100,100):0;
    var pctD = budTotal>0?Math.min(dep/budTotal*100,100):0;
    html += '<div style="width:'+pctR.toFixed(0)+'%;background:var(--green)"></div>';
    html += '<div style="width:'+pctD.toFixed(0)+'%;background:var(--red)"></div>';
    html += '</div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px"><span>● Revenus '+pctR.toFixed(0)+'%</span><span>● Dépenses '+pctD.toFixed(0)+'%</span></div></div>';
  }
  if (opts.budget && budget.length) {
    html += '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">📊 Budget vs Réel</div>';
    html += '<div class="table-wrap"><table><tr><th>Catégorie</th><th style="text-align:right">Budget</th><th style="text-align:right">Réel</th><th style="text-align:right">Écart</th><th style="text-align:right">%</th></tr>';
    budget.forEach(function(b) {
      var d = txs.filter(function(t){return t.categorie===b.categorie&&t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
      var ecart = Number(b.montant)-d, pct = b.montant?Math.round(d/Number(b.montant)*100):0;
      html += '<tr><td>'+(b.icone||'📌')+' '+b.categorie+'</td><td style="text-align:right">'+fmtMoney(b.montant)+'</td><td style="text-align:right;color:'+(d>b.montant?'var(--red)':'var(--text)')+'">'+fmtMoney(d)+'</td><td style="text-align:right;color:'+(ecart<0?'var(--red)':'var(--green)')+'">'+fmtMoney(ecart)+'</td><td style="text-align:right">'+pct+'%</td></tr>';
    });
    html += '</table></div>';
  }
  if (opts.imprev) {
    var imprevs = txs.filter(function(t){return t.imprev;});
    if (imprevs.length) {
      html += '<div style="font-size:13px;font-weight:600;color:var(--amber);margin:14px 0 8px">⚠️ Dépenses imprévues ('+imprevs.length+')</div>';
      html += '<div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Justification</th><th style="text-align:right">Montant</th></tr>';
      imprevs.forEach(function(t){html += '<tr><td>'+fmtDate(t.date)+'</td><td>'+(t.desc||'-')+'</td><td>'+t.categorie+'</td><td style="font-size:11px;color:var(--amber)">'+(t.imprevNote||'—')+'</td><td style="text-align:right;color:var(--red)">'+fmtMoney(t.montant)+'</td></tr>';});
      html += '</table></div>';
    }
  }
  if (opts.detail && txs.length) {
    html += '<div style="font-size:13px;font-weight:600;color:var(--text);margin:14px 0 8px">📋 Toutes les transactions ('+txs.length+')</div>';
    html += '<div class="table-wrap"><table><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Type</th><th style="text-align:right">Montant</th></tr>';
    txs.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(t){
      html += '<tr><td>'+fmtDate(t.date)+'</td><td>'+(t.desc||'-')+'</td><td>'+(t.categorie||'-')+'</td>';
      html += '<td><span class="badge '+(t.type==='Revenu'?'badge-green':'badge-red')+'">'+t.type+'</span></td>';
      html += '<td style="text-align:right;font-weight:600;color:'+(t.type==='Revenu'?'var(--green)':'var(--red)')+'">'+fmtMoney(t.montant)+'</td></tr>';
    });
    html += '</table></div>';
  }
  return html;
}

  }

  // ── GRAPHIQUE CASHFLOW SVG ───────────────────────────────────────────
  if (opts.cashflow !== false && txs.length) {
    html += '<h2>📈 Cashflow mensuel</h2>';
    // Construire données par mois depuis les transactions
    var moisMap = {};
    txs.forEach(function(t) {
      if (!t.date) return;
      var d = new Date(t.date);
      var mk = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if (!moisMap[mk]) moisMap[mk] = {rev:0,dep:0};
      if (t.type==='Revenu') moisMap[mk].rev += Number(t.montant||0);
      else moisMap[mk].dep += Number(t.montant||0);
    });
    var moisKeys = Object.keys(moisMap).sort();
    // SVG cashflow
    var SW=720, SH=200, PL=70, PR=20, PT=20, PB=50;
    var CW=SW-PL-PR, CH=SH-PT-PB;
    var n=moisKeys.length||1;
    var allVals=[];
    moisKeys.forEach(function(k){allVals.push(moisMap[k].rev,moisMap[k].dep,budTotal);});
    var maxV = Math.max.apply(null,allVals)*1.15||1000;
    var step=CW/n, barW=Math.max(6,Math.min(Math.floor(step*0.3),36));
    var toY=function(v){return PT+CH-(Math.max(0,v)/maxV)*CH;};
    var svg = '<svg width="'+SW+'" height="'+SH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+SW+'px">';
    // Fond
    svg += '<rect x="'+PL+'" y="'+PT+'" width="'+CW+'" height="'+CH+'" fill="#f9fafb" stroke="#eee"/>';
    // Grilles et labels Y
    for (var g=0;g<=4;g++) {
      var gy=PT+CH-(g/4)*CH;
      svg += '<line x1="'+PL+'" y1="'+gy+'" x2="'+(SW-PR)+'" y2="'+gy+'" stroke="#ddd" stroke-dasharray="4,2"/>';
      var numY=Math.round(maxV*g/4);
      var lblY = numY>=1000?(numY/1000).toFixed(1)+'k$':numY+'$';
      svg += '<text x="'+(PL-5)+'" y="'+(gy+4)+'" font-size="10" fill="#888" text-anchor="end">'+lblY+'</text>';
    }
    // Barres + labels X
    var bPts=[], dPts=[], nPts=[];
    moisKeys.forEach(function(k,i){
      var cx=PL+i*step+step/2;
      var m=moisMap[k];
      // Barre revenus
      var bRev=toY(m.rev);
      svg += '<rect x="'+(cx-barW-1)+'" y="'+bRev+'" width="'+barW+'" height="'+(PT+CH-bRev)+'" fill="#1A8A5A" opacity="0.8" rx="2"/>';
      // Barre dépenses
      var bDep=toY(m.dep);
      svg += '<rect x="'+(cx+1)+'" y="'+bDep+'" width="'+barW+'" height="'+(PT+CH-bDep)+'" fill="#C03535" opacity="0.8" rx="2"/>';
      // Label mois
      var d2=new Date(k+'-01');
      var lbl=d2.toLocaleDateString('fr-CA',{month:'short',year:'2-digit'}).toUpperCase();
      svg += '<text x="'+cx+'" y="'+(SH-PT+4)+'" font-size="9" fill="#555" text-anchor="middle">'+lbl+'</text>';
      // Points pour lignes
      var bY=toY(budTotal);
      bPts.push(cx+','+bY);
      var nY=Math.max(PT,Math.min(PT+CH,toY(m.rev-m.dep)));
      nPts.push(cx+','+nY);
      // Stocker pour points
      moisMap[k]._cx=cx; moisMap[k]._nY=nY; moisMap[k]._bY=bY;
    });
    // Ligne budget
    if (moisKeys.length>1) svg += '<polyline points="'+bPts.join(' ')+'" fill="none" stroke="#2A68B4" stroke-width="2" stroke-dasharray="6,3"/>';
    // Ligne cashflow net
    if (moisKeys.length>1) svg += '<polyline points="'+nPts.join(' ')+'" fill="none" stroke="#D4A843" stroke-width="2.5"/>';
    // Points
    moisKeys.forEach(function(k){
      var m=moisMap[k];
      if (m._bY!==undefined) svg += '<circle cx="'+m._cx+'" cy="'+m._bY+'" r="4" fill="#2A68B4" stroke="#fff" stroke-width="1.5"/>';
      if (m._nY!==undefined) {
        var pos=(moisMap[k].rev-moisMap[k].dep)>=0;
        svg += '<circle cx="'+m._cx+'" cy="'+m._nY+'" r="5" fill="'+(pos?'#D4A843':'#C03535')+'" stroke="#fff" stroke-width="1.5"/>';
      }
    });
    // Légende
    var lx=PL, ly=SH-5;
    [['#1A8A5A','Revenus',false],['#C03535','Dépenses',false],['#2A68B4','Budget prévu',true],['#D4A843','Cashflow net',false,true]].forEach(function(l){
      if (l[2]) { svg += '<line x1="'+lx+'" y1="'+(ly-5)+'" x2="'+(lx+14)+'" y2="'+(ly-5)+'" stroke="'+l[0]+'" stroke-width="2" stroke-dasharray="4,2"/>';}
      else { svg += '<rect x="'+lx+'" y="'+(ly-11)+'" width="14" height="10" fill="'+l[0]+'" rx="2"/>'; }
      svg += '<text x="'+(lx+17)+'" y="'+ly+'" font-size="10" fill="#444">'+l[1]+'</text>';
      lx += 14+8+l[1].length*5.8+8;
    });
    svg += '</svg>';
    html += '<div style="margin-bottom:20px">'+svg+'</div>';
  }

  // ── BUDGET VS RÉEL ──────────────────────────────────────────────────
  if (opts.budget !== false && budget.length) {
    html += '<h2>📊 Budget vs Réel par catégorie</h2>';
    html += '<table class="data"><tr><th>Catégorie</th><th>Budget prévu</th><th>Dépenses réelles</th><th>Écart</th><th>%</th><th>Avancement</th></tr>';
    budget.forEach(function(b) {
      var d = txs.filter(function(t){return t.categorie===b.categorie&&t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
      var ec=Number(b.montant)-d, pct=b.montant?Math.round(d/Number(b.montant)*100):0;
      var barPct=Math.min(pct,100);
      var barCol=pct>100?'#C03535':pct>80?'#D4943A':'#1A8A5A';
      html += '<tr><td>'+(b.icone||'📌')+' <strong>'+b.categorie+'</strong></td>';
      html += '<td>'+fmtMoney(b.montant)+'</td>';
      html += '<td class="'+(d>b.montant?'r':'')+'"><strong>'+fmtMoney(d)+'</strong></td>';
      html += '<td class="'+(ec<0?'r':'g')+'">'+fmtMoney(ec)+'</td>';
      html += '<td style="font-weight:700;color:'+(pct>100?'#C03535':pct>80?'#B07020':'#1A8A5A')+'">'+pct+'%</td>';
      html += '<td style="min-width:80px"><div class="bar-wrap" style="height:12px"><div class="bar-fill" style="width:'+barPct+'%;background:'+barCol+'"></div></div></td>';
      html += '</tr>';
    });
    // Total
    var depTotal = txs.filter(function(t){return t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
    var ecTotal = budTotal-depTotal;
    html += '<tr style="background:#f0f2f5;font-weight:700"><td>TOTAL</td><td>'+fmtMoney(budTotal)+'</td><td class="'+(depTotal>budTotal?'r':'')+'">'+fmtMoney(depTotal)+'</td>';
    html += '<td class="'+(ecTotal<0?'r':'g')+'">'+fmtMoney(ecTotal)+'</td><td>'+(budTotal?Math.round(depTotal/budTotal*100):0)+'%</td><td></td></tr>';
    html += '</table>';
  }

  // ── DÉPENSES IMPRÉVUES ──────────────────────────────────────────────
  if (opts.imprev !== false) {
    var imprevs = txs.filter(function(t){return t.imprev;});
    if (imprevs.length) {
      var totalImprev = imprevs.reduce(function(a,t){return a+Number(t.montant||0);},0);
      html += '<h2>⚠️ Dépenses imprévues — '+imprevs.length+' dépense(s) · '+fmtMoney(totalImprev)+'</h2>';
      html += '<table class="data"><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Justification</th><th style="text-align:right">Montant</th></tr>';
      imprevs.forEach(function(t){
        html += '<tr class="imprev-row"><td>'+fmtDate(t.date)+'</td><td>'+(t.desc||'-')+'</td><td>'+t.categorie+'</td>';
        html += '<td style="font-size:11px;color:#B07020;font-style:italic">'+(t.imprevNote||'—')+'</td>';
        html += '<td style="text-align:right" class="r"><strong>'+fmtMoney(t.montant)+'</strong></td></tr>';
      });
      html += '</table>';
    }
  }

  // ── TOUTES LES TRANSACTIONS ─────────────────────────────────────────
  if (opts.detail !== false && txs.length) {
    html += '<h2>📋 Toutes les transactions ('+txs.length+')</h2>';
    html += '<table class="data"><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Type</th><th style="text-align:right">Montant</th></tr>';
    txs.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(t){
      var est = t.type==='Revenu';
      html += '<tr><td>'+fmtDate(t.date)+'</td><td>'+(t.desc||'-')+(t.imprev?'<span style="font-size:10px;color:#B07020;margin-left:4px">⚠️ imprévu</span>':'')+'</td>';
      html += '<td>'+(t.categorie||'-')+'</td>';
      html += '<td><span class="'+(est?'badge-g':'badge-r')+'">'+t.type+'</span></td>';
      html += '<td style="text-align:right;font-weight:700" class="'+(est?'g':'r')+'">'+fmtMoney(t.montant)+'</td></tr>';
    });
    html += '</table>';
  }

  html += '<div class="footer">FamilyOS v'+APP_VERSION+' &nbsp;·&nbsp; Généré le '+new Date().toLocaleDateString('fr-CA')+'</div>';
  html += '</div></body></html>';
  return html;
}

// ═══════════════════════════════════════════════════════════════════════════
// EXPORT PDF
// ═══════════════════════════════════════════════════════════════════════════
function exporterPDF() {
  if (!window.jspdf) { toast('Bibliothèque PDF non chargée — vérifiez votre connexion','var(--red2)'); return; }
  try {
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var W = doc.internal.pageSize.getWidth();
    var today = new Date().toLocaleDateString('fr-CA');
    var y = 15;
    // Header
    doc.setFillColor(15,28,46); doc.rect(0,0,W,28,'F');
    doc.setTextColor(212,168,67); doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text('FamilyOS — Rapport familial', 14, 17);
    doc.setFontSize(9); doc.setTextColor(143,168,200);
    doc.text(DB.famille.nom + ' · Généré le ' + today, 14, 24);
    y = 36;
    var hs = {fillColor:[30,47,68], textColor:[212,168,67], fontSize:8};
    var bs = {fontSize:8, textColor:[180,200,220]};
    var ss = {fillColor:[15,28,46]};
    function addSection(title) {
      if (y > 220) { doc.addPage(); y = 15; }
      doc.setTextColor(212,168,67); doc.setFontSize(13); doc.setFont('helvetica','bold');
      doc.text(title, 14, y); y += 6;
    }
    // KPIs
    addSection('Tableau de bord');
    var rev = DB.finances.transactions.filter(function(t){return t.type==='Revenu';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
    var dep = DB.finances.transactions.filter(function(t){return t.type==='Dépense';}).reduce(function(a,t){return a+Number(t.montant||0);},0);
    doc.autoTable({startY:y, head:[['Indicateur','Valeur']], body:[
      ['Membres',getMembres().length],
      ['Tâches actives',DB.taches.items.filter(function(t){return t.statut!=='Terminé';}).length],
      ['Objectifs',DB.objectifs.projets.length],
      ['Total investi',fmtMoney(DB.investissements.comptes.reduce(function(a,c){return a+Number(c.solde||0);},0))],
      ['Revenus',fmtMoney(rev)], ['Dépenses',fmtMoney(dep)], ['Solde',fmtMoney(rev-dep)]
    ], theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    // Membres
    if (getMembres().length) {
      addSection('Membres de la famille');
      doc.autoTable({startY:y, head:[['Prénom','Nom','Rôle','Âge','Email']], body:getMembres().map(function(m){return[m.prenom,m.nom||'-',m.role||'-',m.age||'-',m.email||'-'];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Objectifs
    if (DB.objectifs.projets.length) {
      addSection('Objectifs (PMP)');
      doc.autoTable({startY:y, head:[['Objectif','Pilier','Responsable','Priorité','Statut','%','Échéance']], body:DB.objectifs.projets.map(function(p){return[p.nom,p.pilier||'-',p.responsable||'-',p.priorite||'-',p.statut||'-',(p.pct||0)+'%',fmtDate(p.echeance)];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Tâches
    if (DB.taches.items.length) {
      addSection('Tâches');
      doc.autoTable({startY:y, head:[['Tâche','Responsable','Priorité','Statut','Échéance']], body:DB.taches.items.map(function(t){return[t.titre,t.responsable||'-',t.priorite||'-',t.statut||'-',fmtDate(t.echeance)];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Finances
    if (DB.finances.transactions.length) {
      addSection('Finances');
      doc.autoTable({startY:y, head:[['Date','Description','Catégorie','Type','Montant']], body:DB.finances.transactions.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,30).map(function(t){return[fmtDate(t.date),t.desc||'-',t.categorie||'-',t.type,fmtMoney(t.montant)];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss}); y = doc.lastAutoTable.finalY + 10;
    }
    // Investissements
    if (DB.investissements.comptes.length) {
      addSection('Investissements');
      doc.autoTable({startY:y, head:[['Type','Nom','Institution','Solde','Cible','%']], body:DB.investissements.comptes.map(function(c){return[c.type,c.nom,c.institution||'-',fmtMoney(c.solde),c.cible?fmtMoney(c.cible):'-',c.cible?Math.round(c.solde/c.cible*100)+'%':'-'];}), theme:'grid', headStyles:hs, bodyStyles:bs, styles:ss});
    }
    // Footer
    var np = doc.internal.getNumberOfPages();
    for (var i = 1; i <= np; i++) {
      doc.setPage(i); doc.setFontSize(7); doc.setTextColor(74,106,138);
      doc.text('FamilyOS · '+DB.famille.nom+' · Page '+i+'/'+np, W/2, doc.internal.pageSize.getHeight()-6, {align:'center'});
    }

if ('serviceWorker' in navigator) {
  var swUrl = window.location.href;
  var isLocal = swUrl.startsWith('file://');
  var isPreview = swUrl.includes('claudeusercontent') || swUrl.includes('claude.ai');
  if (!isLocal && !isPreview) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js')
        .then(function(reg) {
          console.log('SW enregistré v'+APP_VERSION+':', reg.scope);
          // Détecter une mise à jour disponible
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                afficherBanniereMAJ();
              }
            });
          });
        })
        .catch(function(err) { console.log('SW non disponible:', err.message); });

      // Quand le SW prend le contrôle → recharger pour appliquer la MAJ
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
    });
  }
}

// COULEURS WINDOWS
// ═══════════════════════════════════════════════════════════════════════════
function utiliserCouleursWindows() {
  // Méthode 1 : CSS accent-color (Edge/Chrome sur Windows 11)
  var accentHex = getWindowsAccentCSS();

  if (accentHex) {
    appliquerAccentWindows(accentHex);
  } else {
    // Méthode 2 : media query prefers-color-scheme + canvas trick
    accentHex = getAccentViaCanvas();
    if (accentHex) {
      appliquerAccentWindows(accentHex);
    } else {
      // Méthode 3 : demander à l'utilisateur de choisir dans le sélecteur
      toast('Détection auto non disponible — utilisez le sélecteur de couleur ci-dessous','var(--amber)');
      var status = document.getElementById('win-color-status');
      if (status) status.innerHTML = '⚠️ Ouvrez <strong>Paramètres Windows → Personnalisation → Couleurs</strong> puis copiez la couleur dans le sélecteur "Couleur d\'accentuation" ci-dessous.';
    }
  }
}

function getWindowsAccentCSS() {
  try {
    // Créer un élément temporaire et lire la couleur accent CSS du système
    var el = document.createElement('div');
    el.style.cssText = 'position:absolute;width:1px;height:1px;background:AccentColor;visibility:hidden';
    document.body.appendChild(el);
    var color = window.getComputedStyle(el).backgroundColor;
    document.body.removeChild(el);
    if (color && color !== 'rgba(0, 0, 0, 0)' && color !== 'transparent' && color.startsWith('rgb')) {
      return rgbStringToHex(color);
    }
  } catch(e) {}
  return null;
}

function getAccentViaCanvas() {
  try {
    // Lire la CSS variable --accent-color si disponible (Edge PWA)
    var accent = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
    if (accent && accent.startsWith('#')) return accent;
    // Essayer accent-color via un input range
    var input = document.createElement('input');
    input.type = 'range';
    input.style.cssText = 'position:absolute;opacity:0;pointer-events:none';
    document.body.appendChild(input);
    var thumbColor = window.getComputedStyle(input).accentColor;
    document.body.removeChild(input);
    if (thumbColor && thumbColor !== 'auto' && thumbColor.startsWith('rgb')) {
      return rgbStringToHex(thumbColor);
    }
  } catch(e) {}
  return null;
}

function rgbStringToHex(rgb) {
  var m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!m) return null;
  return '#' + [m[1],m[2],m[3]].map(function(v) {
    return ('0'+parseInt(v).toString(16)).slice(-2);
  }).join('');
}

function appliquerAccentWindows(hex) {
  // Générer fond sombre harmonieux basé sur l'accent Windows
  var c = hexToRgb(hex);
  if (!c) return;
  // Fond : version très sombre de l'accent
  var fond = 'rgb('+Math.round(c.r*0.08)+','+Math.round(c.g*0.08)+','+Math.round(c.b*0.08)+')';
  // Sidebar : légèrement plus clair
  var sidebar = 'rgb('+Math.round(c.r*0.12)+','+Math.round(c.g*0.12)+','+Math.round(c.b*0.12)+')';
  // Carte : intermédiaire
  var carte = 'rgb('+Math.round(c.r*0.15)+','+Math.round(c.g*0.15)+','+Math.round(c.b*0.15)+')';

  DB.parametres = Object.assign(DB.parametres||{}, {
    theme: 'windows',
    couleurAccent: hex,
    couleurFond: fond,
    couleurSidebar: sidebar,
    couleurCarte: carte,
    windowsAccentColor: hex
  });
  saveData();
  appliquerTheme();
  render();
  toast('Couleur Windows appliquée : ' + hex + ' ✓');
}

// Écouter les changements de couleur Windows en temps réel (Edge PWA)

    var mq = window.matchMedia('(prefers-color-scheme: dark)');

      }
    });
  } catch(e) {}
}

function formatTelephoneWA(tel) {
  // Retire tout sauf les chiffres et le + initial
  return tel.replace(/[^\d+]/g,'').replace(/^\+/,'');
}

function buildMessage(tache) {
  var msg = '🏠 *FamilyOS — ' + DB.famille.nom + '*\n\n';
  msg += '📌 *Nouvelle tâche assignée*\n\n';
  msg += '📋 *' + tache.titre + '*\n';
  msg += '⚡ Priorité : ' + (tache.priorite||'Normale') + '\n';
  if (tache.echeance) msg += '📅 Échéance : ' + fmtDate(tache.echeance) + '\n';
  if (tache.categorie) msg += '📂 Catégorie : ' + tache.categorie + '\n';
  if (tache.description) msg += '📝 ' + tache.description + '\n';
  msg += '\n— FamilyOS';
  return msg;
}

function envoyerWhatsApp(tacheId, tel) {
  var tache = DB.taches.items.find(function(t){return t.id===tacheId;});
  if (!tache || !tel) return;
  var numero = formatTelephoneWA(tel);
  var msg = encodeURIComponent(buildMessage(tache));
  window.open('https://wa.me/' + numero + '?text=' + msg, '_blank');
  toast('WhatsApp ouvert ✓');
}

function envoyerSMS(tacheId, tel) {
  var tache = DB.taches.items.find(function(t){return t.id===tacheId;});
  if (!tache || !tel) return;
  var msg = encodeURIComponent(buildMessage(tache).replace(/\*/g,''));
  // sms: fonctionne sur Android, iOS et Windows (Phone Link)
  var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  var sep = isMobile && /iPhone|iPad/i.test(navigator.userAgent) ? '&' : '?';
  window.location.href = 'sms:' + tel + sep + 'body=' + msg;
  toast('SMS ouvert ✓');
}

        {id:'p2',ordre:2,titre:'Louange & Adoration',         duree:15,responsable:'Musicien', notes:'3-4 cantiques de louange'},
        {id:'p3',ordre:3,titre:'Lecture biblique',            duree:10,responsable:'Directeur',notes:'Passage du jour + bref commentaire'},
        {id:'p4',ordre:4,titre:'Prière d\'intercession',      duree:20,responsable:'Groupe',   notes:'Sujets de prière collectifs'},
        {id:'p5',ordre:5,titre:'Témoignages & Partage',       duree:10,responsable:'Membres',  notes:'Réponses de prière, encouragements'},
        {id:'p6',ordre:6,titre:'Prière personnelle',          duree:10,responsable:'Groupe',   notes:'Temps de prière silencieuse'},
        {id:'p7',ordre:7,titre:'Annonces & Bénédiction finale',duree:5,responsable:'Directeur',notes:'Clôture, prochaine rencontre'}
      ],
      rotations:[],sujetsPriere:[],historique:[]
    };
  }
  return DB.autres;
}

  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';

  html += '<div style="display:flex;gap:8px"><button class="btn btn-gold btn-sm" onclick="genererRotation()">🔄 Générer (fin déc.)</button><button class="btn btn-outline btn-sm" onclick="openModal(\'modal-eg-rotation-manuel\')">+ Manuel</button><button class="btn btn-green btn-sm" onclick="imprimerTableauRotation()">🖨 PDF</button></div>';
  html += '</div>';

    html += '<div class="empty">Ajoutez d\'abord vos membres dans l\'onglet Membres puis cliquez Générer.</div>';
  } else if (!a.rotations.length) {
    html += '<div style="text-align:center;padding:32px;background:var(--navy3);border-radius:12px"><div style="font-size:32px;margin-bottom:10px">🔄</div><div style="font-size:14px;color:var(--text2);margin-bottom:16px">Chaque membre dirige à tour de rôle chaque '+JOURS_NOMS[getJourRencontre()].toLowerCase()+'.<br>Cliquez Générer pour créer le programme jusqu\'au 31 décembre.</div><button class="btn btn-gold" onclick="genererRotation()">🔄 Générer le programme tournant</button></div>';
  } else {
    var prochain = a.rotations.find(function(r){ return r.date >= new Date().toISOString().slice(0,10); });
    if (prochain) {
      var col0 = avatarColorStr(prochain.directeur);
      html += '<div style="margin-bottom:14px;background:rgba(154,106,218,.1);border:1px solid rgba(154,106,218,.25);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">';
      html += '<div style="font-size:12px;color:var(--purple);font-weight:600">PROCHAINE RENCONTRE</div>';
      html += '<div style="font-size:18px;font-weight:700;color:var(--gold)">'+fmtDate(prochain.date)+'</div>';
      html += '<div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:'+col0+'22;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:'+col0+'">'+prochain.directeur.slice(0,1).toUpperCase()+'</div><span style="font-size:14px;font-weight:600;color:var(--text)">'+prochain.directeur+'</span></div>';
      if (prochain.theme) html += '<span style="font-size:12px;color:var(--text3)">📖 '+prochain.theme+'</span>';
      html += '</div>';
    }
    html += '<div class="table-wrap"><table><tr><th>#</th><th>Date ('+JOURS_NOMS[getJourRencontre()]+')</th><th>Directeur</th><th>Thème de la rencontre</th><th>Statut</th><th></th></tr>';
    a.rotations.forEach(function(r, idx) {
      var isPast = r.date < new Date().toISOString().slice(0,10);
      var isToday = r.date === new Date().toISOString().slice(0,10);
      var col = avatarColorStr(r.directeur);
      var memOpts = a.membres.map(function(m){ return '<option value="'+m.prenom+'"'+(m.prenom===r.directeur?' selected':'')+'>'+m.prenom+' '+(m.nom||'')+'</option>'; }).join('');
      html += '<tr style="'+(isPast&&!isToday?'opacity:.55':'')+'"><td style="font-weight:700;color:var(--gold)">'+(idx+1)+'</td>';
      html += '<td style="font-weight:500">'+fmtDate(r.date)+'</td>';
      html += '<td><div style="display:flex;align-items:center;gap:8px"><div style="width:26px;height:26px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+col+'">'+r.directeur.slice(0,1)+'</div>';
      // Sélecteur de directeur inline
      html += '<select onchange="updateRotationDirecteur(\''+r.id+'\',this.value)" style="font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--navy4);color:var(--text);cursor:pointer">'+memOpts+'</select>';
      html += '</div></td>';
      html += '<td><input value="'+(r.theme||'')+'" onchange="updateRotationTheme(\''+r.id+'\',this.value)" style="font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--navy4);color:var(--text2);width:100%" placeholder="Thème..."/></td>';
      html += '<td>'+(isToday?'<span class="badge badge-gold">Aujourd\'hui</span>':isPast?'<span class="badge badge-gray">Passé</span>':'<span class="badge badge-blue">À venir</span>')+'</td>';
      html += '<td><button class="btn btn-sm btn-outline" onclick="supprimerRotation(\''+r.id+'\')">✕</button></td></tr>';
    });
    html += '</table></div>';
  }
  html += '</div>';

  // ── MEMBRES ─────────────────────────────────────────────────────────────
  html += '<div id="eg-membres" style="display:none">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html += '<div><span style="font-size:15px;font-weight:600">'+a.membres.length+' membre'+(a.membres.length!==1?'s':'')+' du groupe</span>';
  html += '<span style="font-size:12px;color:var(--text3);margin-left:10px">Ordre = ordre de rotation</span></div>';
  html += '<button class="btn btn-gold" onclick="openModal(\'modal-eg-membre\')">+ Ajouter</button></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">';
  if (a.membres.length) {
    a.membres.forEach(function(m,idx){
      var col=avatarColorStr(m.prenom);
      var prochRot=a.rotations.filter(function(r){return r.directeur===m.prenom&&new Date(r.date+'T12:00:00')>=new Date();}).slice(0,1)[0];
      html+='<div class="card" style="border-top:3px solid '+col+';padding:14px">';
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
      html+='<div style="width:42px;height:42px;border-radius:50%;background:'+col+'22;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:'+col+'">'+m.prenom.slice(0,1).toUpperCase()+'</div>';
      html+='<div style="flex:1"><div style="font-size:14px;font-weight:600">'+m.prenom+' '+(m.nom||'')+'</div>';
      html+='<div style="font-size:11px;color:var(--text3)">'+(m.role||'Membre')+'</div></div>';
      html+='<span onclick="editOrdreEglise('+idx+','+a.membres.length+',\''+m.id+'\')" title="Cliquer pour changer le numéro" style="font-size:12px;background:'+col+'22;color:'+col+';padding:2px 8px;border-radius:10px;font-weight:700;cursor:pointer" title="Cliquer pour modifier l\'ordre">#'+(idx+1)+' ✏</span>';
      html+='</div>';
      if(m.email) html+='<div style="font-size:11px;color:var(--text3);margin-bottom:2px">✉️ '+m.email+'</div>';
      if(m.telephone) html+='<div style="font-size:11px;color:var(--text3);margin-bottom:6px">📱 '+m.telephone+'</div>';
      if(prochRot) html+='<div style="font-size:11px;background:rgba(154,106,218,.1);color:var(--purple);padding:4px 8px;border-radius:6px;margin-bottom:8px">🎤 Prochain tour : '+fmtDate(prochRot.date)+'</div>';
      html+='<div style="display:flex;gap:5px">';
      html+='<button class="btn btn-sm btn-outline" style="flex:1" onclick="monterMembreEglise('+idx+')">▲</button>';
      html+='<button class="btn btn-sm btn-outline" style="flex:1" onclick="descendreMembreEglise('+idx+')">▼</button>';
      html+='<button class="btn btn-sm btn-gold" style="flex:1" onclick="editMembreEglise(\''+m.id+'\')">✏️</button>';
      html+='<button class="btn btn-sm btn-outline" onclick="supprimerMembreEglise(\''+m.id+'\')">✕</button>';
      html+='</div></div>';
    });
  } else {
    html+='<div class="card" style="grid-column:1/-1"><div class="empty">Aucun membre. Cliquez "+ Ajouter" pour commencer.</div></div>';
  }
  html+='</div></div>';

  // ── SUJETS DE PRIÈRE ───────────────────────────────────────────────────
  html+='<div id="eg-sujets" style="display:none">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html+='<h3 style="font-size:15px">Sujets de prière collectifs</h3>';
  html+='<button class="btn btn-gold btn-sm" onclick="openModal(\'modal-eg-sujet\')">+ Sujet</button></div>';
  var cats=['Santé','Famille','Finance','Ministère','Nation','Autres'];
  var hasSujets=false;
  cats.forEach(function(cat){
    var sujets=a.sujetsPriere.filter(function(s){return s.categorie===cat;});
    if(!sujets.length) return;
    hasSujets=true;
    html+='<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+cat+'</div>';
    sujets.forEach(function(s){
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--navy3);border-radius:8px;margin-bottom:6px">';
      html+='<input type="checkbox" '+(s.repondu?'checked':'')+' onchange="toggleSujet(\''+s.id+'\')" style="width:15px;height:15px;accent-color:var(--purple);flex-shrink:0"/>';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text);'+(s.repondu?'text-decoration:line-through;color:var(--text3)':'')+'">'+s.sujet+'</div>';
      if(s.notes) html+='<div style="font-size:11px;color:var(--text3)">'+s.notes+'</div>';
      html+='</div>';
      if(s.repondu) html+='<span class="badge badge-green" style="font-size:10px">✅ Répondu</span>';
      html+='<button class="btn btn-sm btn-outline" onclick="supprimerSujet(\''+s.id+'\')">✕</button>';
      html+='</div>';
    });
    html+='</div>';
  });
  if(!hasSujets) html+='<div class="empty">Aucun sujet de prière enregistré.</div>';
  html+='</div>';

  // ── HISTORIQUE ─────────────────────────────────────────────────────────
  html+='<div id="eg-historique" style="display:none">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  html+='<h3 style="font-size:15px">Historique des rencontres</h3>';
  html+='<button class="btn btn-gold btn-sm" onclick="openModal(\'modal-eg-histo\')">+ Rencontre</button></div>';
  if(!a.historique.length){
    html+='<div class="empty">Aucune rencontre enregistrée. Notez vos rencontres après chaque '+JOURS_NOMS[getJourRencontre()].toLowerCase()+'.</div>';
  } else {
    a.historique.slice().sort(function(x,y){return new Date(y.date)-new Date(x.date);}).forEach(function(h){
      html+='<div class="card pilier-card pilier-spirituel" style="margin-bottom:10px">';
      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">';
      html+='<div><div style="font-size:14px;font-weight:600">'+fmtDate(h.date)+' — 🎤 '+h.directeur+'</div>';
      html+='<div style="font-size:12px;color:var(--text3)">👥 '+( h.presents||'?')+' présents</div></div>';
      html+='<div style="display:flex;gap:6px">'+(h.theme?'<span class="badge badge-purple">'+h.theme+'</span>':'');
      html+='<button class="btn btn-sm btn-outline" onclick="supprimerHistorique(\''+h.id+'\')">✕</button></div></div>';
      if(h.notes) html+='<div style="font-size:13px;color:var(--text2);margin-bottom:4px">📝 '+h.notes+'</div>';
      if(h.reponsesPriere) html+='<div style="font-size:12px;color:var(--green)">✅ '+h.reponsesPriere+'</div>';
      html+='</div>';
    });
  }
  html+='</div>';

  // ── MODALS ─────────────────────────────────────────────────────────────
  html += modalEglise();
  return html;
}
